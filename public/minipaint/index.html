<!DOCTYPE html>
<html dir="ltr" lang="en-US">
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=0" />
	<title>miniPaint - Image Editor</title>
	<link rel="icon" sizes="192x192" href="images/favicon.png">
	<script src="dist/bundle.js"></script>
</head>
<body>
	<div class="wrapper">
		<nav aria-label="Main Menu" class="main_menu" id="main_menu"></nav>
		<div class="submenu">
			<a class="logo" href="#">miniPaint</a>
			<div class="block attributes" id="action_attributes"></div>
			<button class="undo_button" id="undo_button" type="button">
				<span class="sr_only">Undo</span>
			</button>
		</div>
		<div class="sidebar_left" id="tools_container"></div>
		<div class="middle_area" id="middle_area">
			<canvas class="ruler_left" id="ruler_left"></canvas>
			<canvas class="ruler_top" id="ruler_top"></canvas>
			<div class="main_wrapper" id="main_wrapper">
				<div class="canvas_wrapper" id="canvas_wrapper">
					<div id="mouse"></div>
					<div class="transparent-grid" id="canvas_minipaint_background"></div>
					<canvas id="canvas_minipaint">
						<div class="trn error">Your browser does not support canvas or JavaScript is not enabled.</div>
					</canvas>
				</div>
			</div>
		</div>
		<div class="sidebar_right">
			<div class="preview block">
				<h2 class="trn toggle" data-target="toggle_preview">Preview</h2>
				<div id="toggle_preview"></div>
			</div>
			<div class="colors block">
				<h2 class="trn toggle" data-target="toggle_colors">Colors</h2>
				<div class="content" id="toggle_colors"></div>
			</div>
			<div class="block" id="info_base">
				<h2 class="trn toggle toggle-full" data-target="toggle_info">Information</h2>
				<div class="content" id="toggle_info"></div>
			</div>
			<div class="details block" id="details_base">
				<h2 class="trn toggle toggle-full" data-target="toggle_details">Layer details</h2>
				<div class="content details-content" id="toggle_details"></div>
			</div>
			<div class="layers block">
				<h2 class="trn">Layers</h2>
				<div class="content" id="layers_base"></div>
			</div>
		</div>
	</div>
	<div class="mobile_menu">
		<button class="left_mobile_menu" id="left_mobile_menu_button" type="button">
			<span class="sr_only">Toggle Menu</span>
		</button>
		<button class="right_mobile_menu" id="mobile_menu_button" type="button">
			<span class="sr_only">Toggle Menu</span>
		</button>
	</div>
	<div class="hidden" id="tmp"></div>
	<div id="popups"></div>

<style>
/* ═══════════════════════════════════════════════════════════════════════
   PHOTOSHOP CC DARK THEME — Refined miniPaint overhaul
   Purple accent: #6C5CE7 (sparingly)  |  Base: #1e1e1e
   ═══════════════════════════════════════════════════════════════════════ */

/* ── 1. CSS VARIABLES ── */
:root {
	--background: #1e1e1e !important;
	--text-color: #c8c8c8 !important;
	--text-color-muted: #707070 !important;
	--text-color-active: #e0e0e0 !important;
	--text-color-red: #e38282 !important;
	--text-color-green: #8bdb8b !important;
	--text-color-blue: #a4a4ff !important;
	--link-color: #6C5CE7 !important;
	--section-background-color: #2c2c2c !important;
	--area-background-color: #252525 !important;
	--block-background-color: #252525 !important;
	--header-background-color: #232323 !important;
	--button-background-color: #3a3a3a !important;
	--button-background-color-hover: #4a4a4a !important;
	--button-background-color-active: #6C5CE7 !important;
	--button-shadow-color: rgba(0,0,0,0.3) !important;
	--button-text-color-active: #fff !important;
	--button-toggle-background-color: #333 !important;
	--button-toggle-background-color-hover: #3a3a3a !important;
	--button-border-radius: 2px !important;
	--input-background-color: #1a1a1a !important;
	--input-background-color-hover: #222 !important;
	--input-text-color: #c8c8c8 !important;
	--input-border-color: #333 !important;
	--input-border-color-active: #6C5CE7 !important;
	--input-border-radius: 2px !important;
	--input-group-border-color: #1a1a1a !important;
	--menu-background-color: #1c1c1c !important;
	--menu-icons-filter: invert(1) !important;
	--menu-icons-filter-active: none !important;
	--menu-text-color: #b0b0b0 !important;
	--background-color-active: #6C5CE7 !important;
	--background-color-hover: #3a3a3a !important;
	--border-color: #1a1a1a !important;
	--scrollbar-track-color: #1e1e1e !important;
	--scrollbar-thumb-color: #444 !important;
	--mobile-menu-toggle-filter: invert(1) !important;
	/* Dropdowns */
	--menu-dropdown-background-color: #252525 !important;
	--menu-dropdown-border-color: #1a1a1a !important;
	--menu-dropdown-text-color: #c8c8c8 !important;
	--menu-dropdown-text-muted-color: #707070 !important;
	--menu-dropdown-hover-background-color: #5a4bd6 !important;
	--menu-dropdown-hover-text-color: #fff !important;
	--menu-dropdown-divider-color: #1a1a1a !important;
}


/* ── 2. BASE RESET ── */
body {
	background: #1e1e1e !important;
	color: #c8c8c8 !important;
	font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, Roboto, Arial, sans-serif !important;
	font-size: 11px !important;
	margin: 0 !important;
	min-height: 100vh !important;
}
* {
	scrollbar-width: thin !important;
	scrollbar-color: #444 #1e1e1e !important;
}
::selection {
	background: #3d3564 !important;
	color: #e0e0e0 !important;
}


/* ── 3. MAIN LAYOUT GRID ── */
.wrapper {
	position: fixed !important;
	top: 24px !important;
	left: 0 !important;
	right: 0 !important;
	bottom: 0 !important;
	display: grid !important;
	grid-template-rows: auto 1fr !important;
	grid-template-columns: auto 1fr auto !important;
	grid-template-areas:
		"submenu submenu submenu"
		"sidebar_left main sidebar_right" !important;
	gap: 0 !important;
	margin: 0 !important;
	overflow: hidden !important;
}


/* ══════════════════════════════════════════
   4. TOP MENU BAR  (Photoshop CC style)
   ══════════════════════════════════════════ */
.main_menu {
	position: fixed !important;
	top: 0 !important;
	left: 0 !important;
	right: 0 !important;
	z-index: 100 !important;
	height: 24px !important;
	background: #1c1c1c !important;
}
.main_menu > ul.menu_bar {
	display: flex !important;
	flex-direction: row !important;
	list-style: none !important;
	padding: 0 !important;
	margin: 0 !important;
	height: 24px !important;
	background: #1c1c1c !important;
	border-bottom: 1px solid #111 !important;
}
.main_menu > ul.menu_bar > li {
	padding: 0 !important;
	height: 100% !important;
}
.main_menu > ul.menu_bar > li > a {
	display: flex !important;
	align-items: center !important;
	font-size: 12px !important;
	color: #b0b0b0 !important;
	text-decoration: none !important;
	padding: 0 10px !important;
	height: 100% !important;
	transition: none !important;
}
.main_menu > ul.menu_bar > li > a:hover {
	background: #3a3a3a !important;
	color: #e0e0e0 !important;
	box-shadow: none !important;
}
.main_menu > ul.menu_bar > li > a:focus {
	outline: none !important;
	box-shadow: none !important;
	background: #3a3a3a !important;
}
.main_menu > ul.menu_bar > li > a[aria-expanded="true"] {
	background: #252525 !important;
	color: #e0e0e0 !important;
}


/* ── 4b. MENU DROPDOWNS ── */
.main_menu > ul.menu_dropdown {
	background: #252525 !important;
	border: 1px solid #1a1a1a !important;
	border-radius: 0 !important;
	box-shadow: 2px 4px 16px rgba(0,0,0,0.8) !important;
	padding: 2px 0 !important;
	min-width: 180px !important;
}
.main_menu > ul.menu_dropdown > li > a {
	display: flex !important;
	align-items: center !important;
	color: #c8c8c8 !important;
	font-size: 12px !important;
	height: 22px !important;
	line-height: 22px !important;
	padding: 0 28px 0 10px !important;
	text-decoration: none !important;
}
.main_menu > ul.menu_dropdown > li > a:hover,
.main_menu > ul.menu_dropdown > li > a:focus {
	background: #5a4bd6 !important;
	color: #fff !important;
	box-shadow: none !important;
}
.main_menu > ul.menu_dropdown > li > a .shortcut {
	margin-left: auto !important;
	color: #707070 !important;
	font-size: 11px !important;
}
.main_menu > ul.menu_dropdown > li > a:hover .shortcut {
	color: rgba(255,255,255,0.7) !important;
}
.main_menu > ul.menu_dropdown > li hr {
	border: none !important;
	border-top: 1px solid #1a1a1a !important;
	margin: 2px 0 !important;
}
.main_menu > ul.menu_dropdown > li > a[aria-haspopup="true"]::after {
	color: #707070 !important;
}


/* ══════════════════════════════════════════
   5. TOOL OPTIONS BAR  (submenu)
   ══════════════════════════════════════════ */
.submenu {
	grid-area: submenu !important;
	display: flex !important;
	flex-direction: row !important;
	align-items: center !important;
	background: #2c2c2c !important;
	margin: 0 !important;
	padding: 0 4px !important;
	height: 26px !important;
	min-height: 26px !important;
	max-height: 26px !important;
	border-top: 1px solid #1a1a1a !important;
	border-bottom: 1px solid #1a1a1a !important;
	overflow: hidden !important;
}

/* Logo — hide it */
.logo {
	display: none !important;
}
.logo:after {
	display: none !important;
}

/* Tool attributes in options bar */
.submenu .block.attributes {
	background: transparent !important;
	border: none !important;
	margin: 0 !important;
	padding: 0 4px !important;
	display: flex !important;
	align-items: center !important;
	gap: 5px !important;
	flex: 1 !important;
	height: 100% !important;
}
.submenu .block.attributes .row {
	display: inline-flex !important;
	align-items: center !important;
	margin: 0 !important;
	min-height: auto !important;
	gap: 3px !important;
	float: none !important;
	clear: none !important;
}
.submenu .block.attributes label {
	color: #808080 !important;
	font-size: 10px !important;
	white-space: nowrap !important;
	margin: 0 !important;
}
.submenu .block.attributes select {
	background: #1a1a1a !important;
	color: #c8c8c8 !important;
	border: 1px solid #333 !important;
	border-radius: 2px !important;
	font-size: 10px !important;
	height: 18px !important;
	padding: 0 3px !important;
}
.submenu .block.attributes input[type="number"],
.submenu .block.attributes input[type="text"] {
	background: #1a1a1a !important;
	color: #c8c8c8 !important;
	border: 1px solid #333 !important;
	border-radius: 2px !important;
	font-size: 10px !important;
	height: 18px !important;
	padding: 0 3px !important;
	width: 48px !important;
}
.submenu .block.attributes input:focus,
.submenu .block.attributes select:focus {
	border-color: #6C5CE7 !important;
	outline: none !important;
}
.submenu .block.attributes input[type="checkbox"] {
	accent-color: #6C5CE7 !important;
	margin: 0 2px 0 0 !important;
}
.submenu .block.attributes .ui_number_input {
	border: 1px solid #333 !important;
	border-radius: 2px !important;
	overflow: hidden !important;
}
.submenu .block.attributes .ui_number_input input {
	border: none !important;
	height: 16px !important;
}

/* Undo button */
.undo_button {
	display: block !important;
	width: 22px !important;
	height: 22px !important;
	margin-left: auto !important;
	margin-right: 2px !important;
	background-size: auto 14px !important;
	opacity: 0.4 !important;
	border: none !important;
	box-shadow: none !important;
	background-color: transparent !important;
}
.undo_button:hover {
	opacity: 1 !important;
	background-color: transparent !important;
	border: none !important;
}


/* ══════════════════════════════════════════
   6. LEFT TOOLBAR  (Photoshop CC style)
   ══════════════════════════════════════════ */
.sidebar_left {
	grid-area: sidebar_left !important;
	width: 40px !important;
	background: #2a2a2a !important;
	padding: 2px 0 !important;
	margin: 0 !important;
	overflow: hidden !important;
	overflow-y: auto !important;
	align-self: stretch !important;
	border-right: 1px solid #1a1a1a !important;
	display: flex !important;
	flex-direction: column !important;
	flex-wrap: nowrap !important;
	align-items: center !important;
	gap: 0 !important;
}


/* ══════════════════════════════════════════
   7. CENTER CANVAS AREA
   ══════════════════════════════════════════ */
.middle_area {
	grid-area: main !important;
	position: relative !important;
	background: #1e1e1e !important;
	overflow: hidden !important;
}
.main_wrapper {
	position: absolute !important;
	top: 0 !important;
	left: 0 !important;
	right: 0 !important;
	bottom: 0 !important;
	overflow: auto !important;
	background: #1e1e1e !important;
}
.canvas_wrapper {
	position: relative !important;
}
.ruler_left {
	background-color: #2c2c2c !important;
}
.ruler_top {
	background-color: #2c2c2c !important;
}


/* ══════════════════════════════════════════
   8. RIGHT SIDEBAR  (Photoshop CC panels)
   ══════════════════════════════════════════ */
.sidebar_right {
	grid-area: sidebar_right !important;
	width: 240px !important;
	margin: 0 !important;
	padding: 0 !important;
	background: #252525 !important;
	overflow-x: hidden !important;
	overflow-y: auto !important;
	border-left: 1px solid #1a1a1a !important;
	display: flex !important;
	flex-direction: column !important;
}

/* Panel blocks */
.sidebar_right > .block {
	background: #2c2c2c !important;
	border: none !important;
	border-bottom: 1px solid #1a1a1a !important;
	border-radius: 0 !important;
	margin: 0 !important;
	flex-shrink: 0 !important;
}
.sidebar_right > .block:last-child {
	border-bottom: none !important;
	flex: 1 !important;
}

/* Panel headers — Photoshop tab style */
.sidebar_right > .block > h2 {
	background: #232323 !important;
	color: #999 !important;
	font-size: 10px !important;
	font-weight: 400 !important;
	text-transform: uppercase !important;
	letter-spacing: 0.5px !important;
	padding: 3px 8px !important;
	margin: 0 !important;
	border-radius: 0 !important;
	border-bottom: 1px solid #1a1a1a !important;
	cursor: pointer !important;
	line-height: 18px !important;
	height: auto !important;
}
.sidebar_right > .block > h2:hover {
	color: #e0e0e0 !important;
	background: #2a2a2a !important;
}
.sidebar_right > .block > h2.toggled {
	border-bottom-color: transparent !important;
}
/* Toggle arrow indicator */
.sidebar_right > .block > h2.toggle::after {
	float: right !important;
	font-size: 9px !important;
	color: #707070 !important;
}

/* Panel content */
.sidebar_right > .block > .content,
.sidebar_right > .block > div:not(h2) {
	padding: 3px 5px !important;
	background: #2c2c2c !important;
}

/* Layers panel — always visible at bottom */
.sidebar_right > .layers {
	flex: 1 !important;
	display: flex !important;
	flex-direction: column !important;
}
.sidebar_right > .layers > h2 {
	background: #232323 !important;
	color: #c8c8c8 !important;
	font-weight: 400 !important;
	border-bottom: 1px solid #6C5CE7 !important;
}
.sidebar_right > .layers > .content {
	flex: 1 !important;
	overflow-y: auto !important;
	padding: 2px !important;
}

/* Layer toolbar buttons (+ D R ↑ ↓) */
.layer_add {
	display: inline-block !important;
	padding: 1px 5px !important;
	margin: 0 1px 3px 0 !important;
	background: #3a3a3a !important;
	border: none !important;
	border-radius: 0 !important;
	color: #c8c8c8 !important;
	font-size: 11px !important;
	cursor: pointer !important;
	line-height: 1.4 !important;
}
.layer_add:hover {
	background: #4a4a4a !important;
	border: none !important;
}
.layer_duplicate,
.layer_raster {
	display: inline-block !important;
	padding: 1px 5px !important;
	margin: 0 1px 3px 0 !important;
	background: #3a3a3a !important;
	border: none !important;
	border-radius: 0 !important;
	color: #c8c8c8 !important;
	font-size: 11px !important;
	cursor: pointer !important;
}
.layer_duplicate:hover,
.layer_raster:hover {
	background: #4a4a4a !important;
	border: none !important;
}
.layers_arrow {
	display: inline-block !important;
	padding: 1px 5px !important;
	margin: 0 1px 3px 0 !important;
	background: #3a3a3a !important;
	border: none !important;
	border-radius: 0 !important;
	color: #c8c8c8 !important;
	font-size: 11px !important;
	cursor: pointer !important;
}
.layers_arrow:hover {
	background: #4a4a4a !important;
	border: none !important;
}

/* Layer list */
.layers_list {
	margin-top: 2px !important;
}
.layers_list .item {
	margin-bottom: 0 !important;
	display: flex !important;
	align-items: center !important;
	border-bottom: 1px solid #1a1a1a !important;
	min-height: 38px !important;
	padding: 3px 4px !important;
	cursor: grab !important;
	user-select: none !important;
}
.layers_list .item button {
	cursor: pointer !important;
}

/* Layer name — Photoshop style */
.layer_name {
	display: block !important;
	padding: 4px 8px !important;
	height: auto !important;
	min-height: 28px !important;
	background: #252525 !important;
	border: 1px solid transparent !important;
	border-radius: 0 !important;
	color: #c8c8c8 !important;
	font-size: 12px !important;
	line-height: 20px !important;
	cursor: pointer !important;
	white-space: nowrap !important;
	overflow: hidden !important;
	text-overflow: ellipsis !important;
}
.layer_name:hover {
	background: #333 !important;
	border-color: transparent !important;
}

/* Active layer — dark purple-tinted like PS selection */
.layers_list .active .layer_name,
.layers_list .item.active .layer_name {
	background: #3d3564 !important;
	color: #e0e0e0 !important;
	border-color: #3d3564 !important;
}

/* Layer visibility eye */
.visibility {
	opacity: 0.4 !important;
	width: 20px !important;
	min-width: 20px !important;
	padding: 0 2px !important;
	margin: 0 !important;
	cursor: pointer !important;
	background: transparent !important;
	border: none !important;
	box-shadow: none !important;
}
.visibility:hover {
	opacity: 1 !important;
	background: transparent !important;
	border: none !important;
}
.visibility.visible {
	opacity: 0.9 !important;
}

/* Layer delete button — trash icon */
.delete {
	width: 20px !important;
	min-width: 20px !important;
	opacity: 0.5 !important;
	border: none !important;
	box-shadow: none !important;
	background-image: none !important;
	background-color: transparent !important;
	display: flex !important;
	align-items: center !important;
	justify-content: center !important;
	padding: 0 !important;
}
.delete:hover {
	opacity: 1 !important;
	background-color: transparent !important;
	background-image: none !important;
	border: none !important;
}
.delete svg {
	pointer-events: none;
}

/* Layer filter items */
.filter {
	margin-bottom: 0 !important;
	margin-left: 24px !important;
	opacity: 0.6 !important;
	font-size: 10px !important;
}

/* Preview / zoom area */
.canvas_preview_wrapper {
	background: #252525 !important;
}
.canvas_preview_details {
	background: transparent !important;
	padding: 3px 0 !important;
}
.canvas_preview_details .details {
	display: flex !important;
	gap: 2px !important;
}
.canvas_preview_details .details button {
	font-size: 10px !important;
	padding: 1px 4px !important;
	background: #3a3a3a !important;
	border: none !important;
	color: #c8c8c8 !important;
	border-radius: 0 !important;
}
.canvas_preview_details .details button:hover {
	background: #4a4a4a !important;
	border: none !important;
}
#zoom_range {
	accent-color: #6C5CE7 !important;
	width: 100% !important;
}

/* Color panel */
.colors .content {
	padding: 3px !important;
}
.colors .ui_color_sample {
	border: 1px solid #333 !important;
	box-shadow: 0 0 0 1px #1a1a1a inset !important;
	border-radius: 0 !important;
}
.ui_icon_button {
	background: transparent !important;
	border: none !important;
	color: #999 !important;
	padding: 2px !important;
	cursor: pointer !important;
	box-shadow: none !important;
}
.ui_icon_button:hover {
	color: #e0e0e0 !important;
	background: transparent !important;
	border: none !important;
}
.ui_icon_button[aria-pressed="true"] {
	color: #6C5CE7 !important;
}
.block_section {
	border-top: 1px solid #1a1a1a !important;
	padding-top: 3px !important;
	margin-top: 3px !important;
}

/* Color picker gradient */
#color_picker_gradient {
	width: 100% !important;
	height: 120px !important;
	border: none !important;
	padding: 0 !important;
	cursor: crosshair !important;
}

/* Swatches */
#color_swatches, #dialog_color_swatches {
	display: flex !important;
	flex-wrap: wrap !important;
	gap: 1px !important;
}


/* ══════════════════════════════════════════
   9. FORM ELEMENTS  (sunken wells)
   ══════════════════════════════════════════ */
input[type="text"],
input[type="number"],
input[type="password"],
input[type="url"],
textarea {
	background: #1a1a1a !important;
	color: #c8c8c8 !important;
	border: 1px solid #333 !important;
	border-radius: 2px !important;
	font-size: 11px !important;
	font-family: inherit !important;
	padding: 2px 4px !important;
}
input[type="text"]:focus,
input[type="number"]:focus,
input[type="password"]:focus,
textarea:focus {
	border-color: #6C5CE7 !important;

select {

}

label {

}

input[type="checkbox"],

}
input[type="range"] {
	accent-color: #6C5CE7 !important;
}

/* Number input widget */
.ui_number_input {

	background: #1a1a1a !important;
}
.ui_number_input input {
	background: #1a1a1a !important;
	color: #c8c8c8 !important;
	border: none !important;

}
.ui_number_input button {

	border: none !important;

	border-radius: 0 !important;
}

/* Input groups */

}
.ui_input_group label {
	font-size: 10px !important;
}
.ui_flex_group {
	display: flex !important;

}


/* ══════════════════════════════════════════
   10. BUTTONS — GENERIC
   ══════════════════════════════════════════ */
button {
	background: #3a3a3a !important;
	color: #c8c8c8 !important;
	border: none !important;
	border-radius: 2px !important;
	font-size: 11px !important;
	font-family: inherit !important;
	padding: 2px 7px !important;
	cursor: pointer !important;
	box-shadow: none !important;
	transition: none !important;
}
button:hover {
	background: #4a4a4a !important;
	color: #e0e0e0 !important;
	border: none !important;
}
button:focus {
	outline: 1px solid #6C5CE7 !important;
	outline-offset: -1px !important;
}

/* Primary action button style */
.button {
	background: #3a3a3a !important;
	color: #c8c8c8 !important;
	border: none !important;
	border-radius: 0 !important;
	padding: 5px 14px !important;

}
.button:hover {

}


/* ══════════════════════════════════════════

   ══════════════════════════════════════════ */
.popup {

}

.popup .dialog_content {

}
.popup .buttons {

/* ══════════════════════════════════════════

/* ══════════════════════════════════════════

/* Row layout */

/* ══════════════════════════════════════════
   15. TOOLBAR OVERRIDES — must come last to
   beat generic button/active rules above
   Photoshop CC: left purple border for active
   ══════════════════════════════════════════ */

/* ══════════════════════════════════════════
   17. PS-STYLE COLOR TOOL (left toolbar bottom)
   ══════════════════════════════════════════ */
.ps-color-tool {
	width: 40px;
	margin-top: 2px;
	padding: 6px 0 8px;
	display: flex;
	flex-direction: column;
	align-items: center;
	border-top: 1px solid #1a1a1a;
}
.ps-color-swatches {
	position: relative;
	width: 28px;
	height: 28px;
}
.ps-fg {
	position: absolute;
	top: 0;
	left: 0;
	width: 18px;
	height: 18px;
	border: 1px solid #888;
	outline: 1px solid #1a1a1a;
	z-index: 2;
	cursor: pointer;
	box-shadow: 1px 1px 2px rgba(0,0,0,0.4);
}
.ps-bg {
	position: absolute;
	bottom: 0;
	right: 0;
	width: 18px;
	height: 18px;
	border: 1px solid #888;
	outline: 1px solid #1a1a1a;
	z-index: 1;
	cursor: pointer;
	box-shadow: 1px 1px 2px rgba(0,0,0,0.4);
}
#tools_container .ps-swap {
	position: absolute;
	top: -2px;
	right: -1px;
	z-index: 3;
	cursor: pointer;
	background: none !important;
	background-color: transparent !important;
	border: none !important;
	padding: 0 !important;
	margin: 0 !important;
	display: flex;
	align-items: center;
	justify-content: center;
	opacity: 0.5 !important;
	min-width: 0 !important;
	min-height: 0 !important;
	width: 14px !important;
	height: 14px !important;
	background-size: 0 !important;
}
#tools_container .ps-swap:hover {
	opacity: 1 !important;
	background-color: transparent !important;
}
#tools_container .ps-swap svg {
	width: 10px;
	height: 10px;
}
#tools_container .ps-default {
	position: absolute;
	bottom: -1px;
	left: -1px;
	z-index: 3;
	cursor: pointer;
	background: none !important;
	background-color: transparent !important;
	border: none !important;
	padding: 0 !important;
	margin: 0 !important;
	display: flex;
	align-items: center;
	justify-content: center;
	opacity: 0.5 !important;
	min-width: 0 !important;
	min-height: 0 !important;
	width: 14px !important;
	height: 14px !important;
	background-size: 0 !important;
}
#tools_container .ps-default:hover {
	opacity: 1 !important;
	background-color: transparent !important;
}
#tools_container .ps-default svg {
	width: 11px;
	height: 11px;
}


/* ══════════════════════════════════════════
   18. LAYER THUMBNAILS
   ══════════════════════════════════════════ */
.layer-thumb {
	width: 42px;
	height: 32px;
	flex-shrink: 0;
	border: 1px solid #1a1a1a;
	margin-right: 6px;
	border-radius: 2px;
	background-image:
		linear-gradient(45deg, #3a3a3a 25%, transparent 25%),
		linear-gradient(-45deg, #3a3a3a 25%, transparent 25%),
		linear-gradient(45deg, transparent 75%, #3a3a3a 75%),
		linear-gradient(-45deg, transparent 75%, #3a3a3a 75%);
	background-size: 8px 8px;
	background-position: 0 0, 0 4px, 4px -4px, -4px 0;
	background-color: #2a2a2a;
	image-rendering: auto;
}
.layers_list .item .layer_name {
	flex: 1 !important;
	min-width: 0 !important;
}

/* Layer drag-and-drop */
.layer-dragging {
	opacity: 0.35 !important;
}
.layer-drop-above {
	border-top: 2px solid #6C5CE7 !important;
}
.layer-drop-below {
	border-bottom-color: #6C5CE7 !important;
	border-bottom-width: 2px !important;
}


/* ══════════════════════════════════════════
   19. PS-STYLE COLOR PICKER DIALOG
   ══════════════════════════════════════════ */
.ps-picker-overlay {
	position: fixed;
	inset: 0;
	background: rgba(0,0,0,0.45);
	z-index: 10000;
	display: none;
	justify-content: center;
	align-items: center;
}
.ps-picker {
	background: #2c2c2c;
	border: 1px solid #555;
	box-shadow: 0 8px 32px rgba(0,0,0,0.7);
	user-select: none;
}
.ps-picker-header {
	background: #383838;
	padding: 5px 10px;
	display: flex;
	justify-content: space-between;
	align-items: center;
	border-bottom: 1px solid #1a1a1a;
	cursor: default;
}
.ps-picker-header span {
	color: #c8c8c8;
	font-size: 12px;
	font-weight: 400;
}
.ps-picker-close {
	background: transparent !important;
	border: none !important;
	color: #999 !important;
	font-size: 18px !important;
	padding: 0 !important;
	margin: 0 !important;
	cursor: pointer !important;
	line-height: 1 !important;
	min-width: auto !important;
	min-height: auto !important;
	width: auto !important;
	height: auto !important;
	box-shadow: none !important;
	opacity: 1 !important;
}
.ps-picker-close:hover {
	color: #fff !important;
	background: transparent !important;
}
.ps-picker-body {
	display: flex;
	padding: 12px;
	gap: 12px;
}
.ps-picker-left {
	display: flex;
	gap: 8px;
	flex-shrink: 0;
}
.ps-picker-sv-wrap {
	position: relative;
	width: 256px;
	height: 256px;
	cursor: crosshair;
}
.ps-picker-sv {
	display: block;
	border: 1px solid #1a1a1a;
}
.ps-picker-sv-cursor {
	position: absolute;
	width: 12px;
	height: 12px;
	border: 1.5px solid #fff;
	border-radius: 50%;
	box-shadow: 0 0 0 1px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(0,0,0,0.3);
	pointer-events: none;
	transform: translate(-6px, -6px);
}
.ps-picker-hue-wrap {
	position: relative;
	width: 20px;
	height: 256px;
	cursor: crosshair;
}
.ps-picker-hue {
	display: block;
	border: 1px solid #1a1a1a;
}
.ps-picker-hue-cursor {
	position: absolute;
	left: -2px;
	right: -2px;
	height: 4px;
	background: transparent;
	border: 1.5px solid #fff;
	box-shadow: 0 0 0 1px rgba(0,0,0,0.6);
	pointer-events: none;
	transform: translateY(-2px);
}
.ps-picker-right {
	display: flex;
	flex-direction: column;
	width: 120px;
	gap: 4px;
}
.ps-picker-preview {
	display: flex;
	flex-direction: column;
	border: 1px solid #1a1a1a;
	height: 44px;
	overflow: hidden;
}
.ps-picker-new, .ps-picker-old {
	flex: 1;
}
.ps-picker-ok {
	width: 100% !important;
	padding: 4px 0 !important;
	background: #4a4a4a !important;
	color: #e0e0e0 !important;
	border: 1px solid #666 !important;
	font-size: 12px !important;
	height: auto !important;
	min-height: auto !important;
	min-width: auto !important;
	border-radius: 2px !important;
}
.ps-picker-ok:hover {
	background: #6C5CE7 !important;
	color: #fff !important;
	border-color: #6C5CE7 !important;
}
.ps-picker-cancel {
	width: 100% !important;
	padding: 4px 0 !important;
	background: #3a3a3a !important;
	color: #c8c8c8 !important;
	border: 1px solid #555 !important;
	font-size: 12px !important;
	height: auto !important;
	min-height: auto !important;
	min-width: auto !important;
	border-radius: 2px !important;
}
.ps-picker-cancel:hover {
	background: #4a4a4a !important;
	color: #e0e0e0 !important;
}
.ps-picker-fields {
	margin-top: 2px;
}
.ps-picker-row {
	display: flex;
	align-items: center;
	margin-bottom: 2px;
	gap: 3px;
}
.ps-picker-row label {
	width: 14px !important;
	text-align: right !important;
	color: #999 !important;
	font-size: 11px !important;
	flex-shrink: 0;
}
.ps-picker-row input[type="number"],
.ps-picker-row input[type="text"] {
	width: 58px !important;
	height: 18px !important;
	padding: 0 3px !important;
	font-size: 11px !important;
	background: #1a1a1a !important;
	color: #c8c8c8 !important;
	border: 1px solid #555 !important;
	border-radius: 1px !important;
}
.ps-picker-row input:focus {
	border-color: #6C5CE7 !important;
	outline: none !important;
}
.ps-picker-row input[type="number"]::-webkit-inner-spin-button,
.ps-picker-row input[type="number"]::-webkit-outer-spin-button {
	-webkit-appearance: none;
	margin: 0;
}
.ps-picker-row input[type="number"] {
	-moz-appearance: textfield;
}
.ps-unit {
	color: #707070;
	font-size: 10px;
	width: 8px;
}
.ps-picker-sep {
	height: 1px;
	background: #1a1a1a;
	margin: 4px 0;
}


/* ══════════════════════════════════════════
   20. FONT PICKER (Fontsource)
   ══════════════════════════════════════════ */
.ps-font-picker {
	position: relative;
	display: inline-block;
	vertical-align: middle;
}
.ps-font-picker-toggle {
	background: #1a1a1a !important;
	color: #c8c8c8 !important;
	border: 1px solid #333 !important;
	border-radius: 2px !important;
	font-size: 10px !important;
	height: 18px !important;
	padding: 0 16px 0 4px !important;
	cursor: pointer !important;
	min-width: 90px !important;
	max-width: 140px !important;
	text-align: left !important;
	overflow: hidden !important;
	text-overflow: ellipsis !important;
	white-space: nowrap !important;
	width: auto !important;
	position: relative !important;
	line-height: 18px !important;
}
.ps-font-picker-toggle::after {
	content: '\25BC';
	position: absolute;
	right: 3px;
	top: 50%;
	transform: translateY(-50%);
	font-size: 7px;
	color: #888;
	pointer-events: none;
}
.ps-font-picker-toggle:hover {
	border-color: #555 !important;
}
.ps-font-picker-toggle:focus,
.ps-font-picker.open .ps-font-picker-toggle {
	border-color: #6C5CE7 !important;
	outline: none !important;
}
.ps-font-dropdown {
	display: none;
	position: fixed;
	width: 240px;
	max-height: 320px;
	background: #1e1e1e;
	border: 1px solid #444;
	border-radius: 4px;
	box-shadow: 0 6px 20px rgba(0,0,0,0.6);
	z-index: 99999;
	flex-direction: column;
	overflow: hidden;
}
/* dropdown display toggled via JS (fixed positioning on body) */
.ps-font-dropdown-search {
	width: 100% !important;
	box-sizing: border-box !important;
	height: 26px !important;
	padding: 0 8px !important;
	font-size: 11px !important;
	background: #151515 !important;
	color: #ddd !important;
	border: none !important;
	border-bottom: 1px solid #333 !important;
	border-radius: 0 !important;
	outline: none !important;
}
.ps-font-dropdown-search:focus {
	border-bottom-color: #6C5CE7 !important;
}
.ps-font-dropdown-search::placeholder {
	color: #555 !important;
}
.ps-font-dropdown-list {
	flex: 1;
	overflow-y: auto;
	overflow-x: hidden;
}
.ps-font-dropdown-list::-webkit-scrollbar {
	width: 5px;
}
.ps-font-dropdown-list::-webkit-scrollbar-track {
	background: transparent;
}
.ps-font-dropdown-list::-webkit-scrollbar-thumb {
	background: #444;
	border-radius: 3px;
}
.ps-font-item {
	padding: 4px 8px;
	font-size: 11px;
	color: #c8c8c8;
	cursor: pointer;
	white-space: nowrap;
	overflow: hidden;
	text-overflow: ellipsis;
}
.ps-font-item:hover,
.ps-font-item.highlighted {
	background: #333;
}
.ps-font-item.selected {
	background: #6C5CE7;
	color: #fff;
}
.ps-font-item .ps-font-tag {
	font-size: 8px;
	color: #888;
	margin-left: 6px;
	vertical-align: middle;
}
.ps-font-item.selected .ps-font-tag {
	color: rgba(255,255,255,0.6);
}

/* ══════════════════════════════════════════
   21. INPAINT TOOL
   ══════════════════════════════════════════ */
#tools_container .inpaint-tool-btn {
	width: 32px !important;
	height: 32px !important;
	min-width: 32px !important;

<script>
(function() {
	/* ── STATE ── */
	var bgColor = '#ffffff';
	var pickerCallback = null;
	var pickerEl = null;
	var currentH = 0, currentS = 0, currentV = 0;
	var svCanvas, hueCanvas, svCtx, hueCtx;
	var svCursor, hueCursor, svWrap, hueWrap;
	var previewNew, previewOld;
	var inputH, inputS, inputB, inputR, inputG, inputBval, inputHex;
	var draggingSV = false, draggingHue = false;

	/* ── COLOR CONVERSIONS ── */
	function hsvToRgb(h, s, v) {
		h = ((h % 360) + 360) % 360; s /= 100; v /= 100;
		var c = v * s, x = c * (1 - Math.abs((h / 60) % 2 - 1)), m = v - c;
		var r, g, b;
		if (h < 60) { r=c; g=x; b=0; }
		else if (h < 120) { r=x; g=c; b=0; }
		else if (h < 180) { r=0; g=c; b=x; }
		else if (h < 240) { r=0; g=x; b=c; }
		else if (h < 300) { r=x; g=0; b=c; }
		else { r=c; g=0; b=x; }
		return [Math.round((r+m)*255), Math.round((g+m)*255), Math.round((b+m)*255)];
	}

	function rgbToHsv(r, g, b) {
		r /= 255; g /= 255; b /= 255;
		var max = Math.max(r, g, b), min = Math.min(r, g, b);
		var h, s, v = max, d = max - min;
		s = max === 0 ? 0 : d / max;
		if (d === 0) h = 0;
		else if (max === r) h = ((g - b) / d + 6) % 6;
		else if (max === g) h = (b - r) / d + 2;
		else h = (r - g) / d + 4;
		return [Math.round(h * 60), Math.round(s * 100), Math.round(v * 100)];
	}

	function rgbToHex(r, g, b) {
		return '#' + ((1 << 24) | (r << 16) | (g << 8) | b).toString(16).slice(1);
	}

	function hexToRgb(hex) {
		hex = hex.replace(/^#/, '');
		if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
		var n = parseInt(hex, 16);
		if (isNaN(n)) return [0, 0, 0];
		return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
	}

	/* ── DRAWING ── */
	function drawSVGradient() {
		var w = 256, h = 256;
		var rgb = hsvToRgb(currentH, 100, 100);
		svCtx.fillStyle = 'rgb(' + rgb[0] + ',' + rgb[1] + ',' + rgb[2] + ')';
		svCtx.fillRect(0, 0, w, h);
		var wg = svCtx.createLinearGradient(0, 0, w, 0);
		wg.addColorStop(0, '#fff');
		wg.addColorStop(1, 'rgba(255,255,255,0)');
		svCtx.fillStyle = wg;
		svCtx.fillRect(0, 0, w, h);
		var bg = svCtx.createLinearGradient(0, 0, 0, h);
		bg.addColorStop(0, 'rgba(0,0,0,0)');
		bg.addColorStop(1, '#000');
		svCtx.fillStyle = bg;
		svCtx.fillRect(0, 0, w, h);
	}

	function drawHueStrip() {
		var w = 20, h = 256;
		for (var y = 0; y < h; y++) {
			var rgb = hsvToRgb((y / h) * 360, 100, 100);
			hueCtx.fillStyle = 'rgb(' + rgb[0] + ',' + rgb[1] + ',' + rgb[2] + ')';
			hueCtx.fillRect(0, y, w, 1);
		}
	}

	function updateCursors() {
		svCursor.style.left = ((currentS / 100) * 256) + 'px';
		svCursor.style.top = ((1 - currentV / 100) * 256) + 'px';
		hueCursor.style.top = ((currentH / 360) * 256) + 'px';
	}

	function updatePreviewAndInputs() {
		var rgb = hsvToRgb(currentH, currentS, currentV);
		var hex = rgbToHex(rgb[0], rgb[1], rgb[2]);
		previewNew.style.backgroundColor = hex;
		inputH.value = currentH;
		inputS.value = currentS;
		inputB.value = currentV;
		inputR.value = rgb[0];
		inputG.value = rgb[1];
		inputBval.value = rgb[2];
		inputHex.value = hex.slice(1);
	}

	/* ── PICKER DIALOG ── */
	function createPickerDialog() {
		var overlay = document.createElement('div');
		overlay.className = 'ps-picker-overlay';
		overlay.innerHTML =
			'<div class="ps-picker">' +
				'<div class="ps-picker-header">' +
					'<span>Color Picker</span>' +
					'<button class="ps-picker-close" type="button">&times;</button>' +
				'</div>' +
				'<div class="ps-picker-body">' +
					'<div class="ps-picker-left">' +
						'<div class="ps-picker-sv-wrap">' +
							'<canvas class="ps-picker-sv" width="256" height="256"></canvas>' +
							'<div class="ps-picker-sv-cursor"></div>' +
						'</div>' +
						'<div class="ps-picker-hue-wrap">' +
							'<canvas class="ps-picker-hue" width="20" height="256"></canvas>' +
							'<div class="ps-picker-hue-cursor"></div>' +
						'</div>' +
					'</div>' +
					'<div class="ps-picker-right">' +
						'<div class="ps-picker-preview">' +
							'<div class="ps-picker-new"></div>' +
							'<div class="ps-picker-old"></div>' +
						'</div>' +
						'<button class="ps-picker-ok" type="button">OK</button>' +
						'<button class="ps-picker-cancel" type="button">Cancel</button>' +
						'<div class="ps-picker-fields">' +
							'<div class="ps-picker-row"><label>H:</label><input type="number" class="ps-input-h" min="0" max="360"><span class="ps-unit">&deg;</span></div>' +
							'<div class="ps-picker-row"><label>S:</label><input type="number" class="ps-input-s" min="0" max="100"><span class="ps-unit">%</span></div>' +
							'<div class="ps-picker-row"><label>B:</label><input type="number" class="ps-input-b" min="0" max="100"><span class="ps-unit">%</span></div>' +
							'<div class="ps-picker-sep"></div>' +
							'<div class="ps-picker-row"><label>R:</label><input type="number" class="ps-input-r" min="0" max="255"></div>' +
							'<div class="ps-picker-row"><label>G:</label><input type="number" class="ps-input-g" min="0" max="255"></div>' +
							'<div class="ps-picker-row"><label>B:</label><input type="number" class="ps-input-bval" min="0" max="255"></div>' +
							'<div class="ps-picker-sep"></div>' +
							'<div class="ps-picker-row"><label>#:</label><input type="text" class="ps-input-hex" maxlength="6" spellcheck="false"></div>' +
						'</div>' +
					'</div>' +
				'</div>' +
			'</div>';

		document.body.appendChild(overlay);
		pickerEl = overlay;

		/* Get references */
		svCanvas = overlay.querySelector('.ps-picker-sv');
		hueCanvas = overlay.querySelector('.ps-picker-hue');
		svCtx = svCanvas.getContext('2d');
		hueCtx = hueCanvas.getContext('2d');
		svCursor = overlay.querySelector('.ps-picker-sv-cursor');
		hueCursor = overlay.querySelector('.ps-picker-hue-cursor');
		svWrap = overlay.querySelector('.ps-picker-sv-wrap');
		hueWrap = overlay.querySelector('.ps-picker-hue-wrap');
		previewNew = overlay.querySelector('.ps-picker-new');
		previewOld = overlay.querySelector('.ps-picker-old');
		inputH = overlay.querySelector('.ps-input-h');
		inputS = overlay.querySelector('.ps-input-s');
		inputB = overlay.querySelector('.ps-input-b');
		inputR = overlay.querySelector('.ps-input-r');
		inputG = overlay.querySelector('.ps-input-g');
		inputBval = overlay.querySelector('.ps-input-bval');
		inputHex = overlay.querySelector('.ps-input-hex');

		drawHueStrip();

		/* SV canvas interaction */
		function handleSV(e) {
			var rect = svCanvas.getBoundingClientRect();
			var x = Math.max(0, Math.min(255, e.clientX - rect.left));
			var y = Math.max(0, Math.min(255, e.clientY - rect.top));
			currentS = Math.round((x / 255) * 100);
			currentV = Math.round((1 - y / 255) * 100);
			updateCursors();
			updatePreviewAndInputs();
		}
		svWrap.addEventListener('mousedown', function(e) {
			e.preventDefault();
			draggingSV = true;
			handleSV(e);
		});

		/* Hue strip interaction */
		function handleHue(e) {
			var rect = hueCanvas.getBoundingClientRect();
			var y = Math.max(0, Math.min(255, e.clientY - rect.top));
			currentH = Math.round((y / 255) * 360);
			drawSVGradient();
			updateCursors();
			updatePreviewAndInputs();
		}
		hueWrap.addEventListener('mousedown', function(e) {
			e.preventDefault();
			draggingHue = true;
			handleHue(e);
		});

		/* Global mouse tracking for drag */
		document.addEventListener('mousemove', function(e) {
			if (draggingSV) handleSV(e);
			if (draggingHue) handleHue(e);
		});
		document.addEventListener('mouseup', function() {
			draggingSV = false;
			draggingHue = false;
		});

		/* Input field handlers */
		function onHSBInput() {
			currentH = Math.max(0, Math.min(360, parseInt(inputH.value) || 0));
			currentS = Math.max(0, Math.min(100, parseInt(inputS.value) || 0));
			currentV = Math.max(0, Math.min(100, parseInt(inputB.value) || 0));
			drawSVGradient();
			updateCursors();
			updatePreviewAndInputs();
		}
		inputH.addEventListener('input', onHSBInput);
		inputS.addEventListener('input', onHSBInput);
		inputB.addEventListener('input', onHSBInput);

		function onRGBInput() {
			var r = Math.max(0, Math.min(255, parseInt(inputR.value) || 0));
			var g = Math.max(0, Math.min(255, parseInt(inputG.value) || 0));
			var b = Math.max(0, Math.min(255, parseInt(inputBval.value) || 0));
			var hsv = rgbToHsv(r, g, b);
			currentH = hsv[0]; currentS = hsv[1]; currentV = hsv[2];
			drawSVGradient();
			updateCursors();
			updatePreviewAndInputs();
		}
		inputR.addEventListener('input', onRGBInput);
		inputG.addEventListener('input', onRGBInput);
		inputBval.addEventListener('input', onRGBInput);

		inputHex.addEventListener('input', function() {
			var val = inputHex.value.replace(/[^0-9a-fA-F]/g, '');
			if (val.length === 6 || val.length === 3) {
				var rgb = hexToRgb(val);
				var hsv = rgbToHsv(rgb[0], rgb[1], rgb[2]);
				currentH = hsv[0]; currentS = hsv[1]; currentV = hsv[2];
				drawSVGradient();
				updateCursors();
				var rgbN = hsvToRgb(currentH, currentS, currentV);
				previewNew.style.backgroundColor = '#' + val;
				inputH.value = currentH;
				inputS.value = currentS;
				inputB.value = currentV;
				inputR.value = rgbN[0];
				inputG.value = rgbN[1];
				inputBval.value = rgbN[2];
			}
		});

		/* OK / Cancel / Close */
		overlay.querySelector('.ps-picker-ok').addEventListener('click', function() {
			closePicker(true);
		});
		overlay.querySelector('.ps-picker-cancel').addEventListener('click', function() {
			closePicker(false);
		});
		overlay.querySelector('.ps-picker-close').addEventListener('click', function() {
			closePicker(false);
		});
		overlay.addEventListener('click', function(e) {
			if (e.target === overlay) closePicker(false);
		});

		/* Keyboard: Escape=cancel, Enter=ok */
		document.addEventListener('keydown', function(e) {
			if (!pickerEl || pickerEl.style.display !== 'flex') return;
			if (e.key === 'Escape') { e.preventDefault(); closePicker(false); }
			if (e.key === 'Enter') { e.preventDefault(); closePicker(true); }
		});

		/* Draggable dialog header */
		var header = overlay.querySelector('.ps-picker-header');
		var dialog = overlay.querySelector('.ps-picker');
		var dragOff = { x: 0, y: 0 }, isDragging = false;
		header.addEventListener('mousedown', function(e) {
			if (e.target.tagName === 'BUTTON') return;
			isDragging = true;
			var rect = dialog.getBoundingClientRect();
			dragOff.x = e.clientX - rect.left;
			dragOff.y = e.clientY - rect.top;
			e.preventDefault();
		});
		document.addEventListener('mousemove', function(e) {
			if (!isDragging) return;
			dialog.style.position = 'fixed';
			dialog.style.left = (e.clientX - dragOff.x) + 'px';
			dialog.style.top = (e.clientY - dragOff.y) + 'px';
			dialog.style.margin = '0';
		});
		document.addEventListener('mouseup', function() { isDragging = false; });
	}

	function openPicker(hexColor, callback) {
		pickerCallback = callback;
		var rgb = hexToRgb(hexColor);
		var hsv = rgbToHsv(rgb[0], rgb[1], rgb[2]);
		currentH = hsv[0]; currentS = hsv[1]; currentV = hsv[2];
		previewOld.style.backgroundColor = hexColor;
		previewNew.style.backgroundColor = hexColor;
		drawSVGradient();
		updateCursors();
		updatePreviewAndInputs();
		/* Reset dialog position to center */
		var dialog = pickerEl.querySelector('.ps-picker');
		dialog.style.position = '';
		dialog.style.left = '';
		dialog.style.top = '';
		dialog.style.margin = '';
		pickerEl.style.display = 'flex';
	}

	function closePicker(accepted) {
		pickerEl.style.display = 'none';
		if (accepted && pickerCallback) {
			var rgb = hsvToRgb(currentH, currentS, currentV);
			var hex = rgbToHex(rgb[0], rgb[1], rgb[2]);
			pickerCallback(hex);
		}
		pickerCallback = null;
	}

	/* ── COLOR TOOL (toolbar swatches) ── */
	function createColorTool() {
		var sidebar = document.querySelector('.sidebar_left');
		if (!sidebar) return;

		var tool = document.createElement('div');
		tool.className = 'ps-color-tool';
		tool.innerHTML =
			'<div class="ps-color-swatches">' +
				'<button class="ps-swap" title="Swap colors (X)">' +
					'<svg viewBox="0 0 10 10" fill="none" stroke="#ccc" stroke-width="1.3">' +
						'<path d="M6 1L9 1L9 4"/>' +
						'<path d="M4 9L1 9L1 6"/>' +
						'<path d="M9 1L5 5"/>' +
						'<path d="M1 9L5 5"/>' +
					'</svg>' +
				'</button>' +
				'<button class="ps-default" title="Default colors (D)">' +
					'<svg viewBox="0 0 11 11">' +
						'<rect x="3" y="3" width="7.5" height="7.5" fill="#fff" stroke="#888" stroke-width="0.7"/>' +
						'<rect x="0.5" y="0.5" width="7.5" height="7.5" fill="#000" stroke="#888" stroke-width="0.7"/>' +
					'</svg>' +
				'</button>' +
				'<div class="ps-fg" title="Foreground color"></div>' +
				'<div class="ps-bg" title="Background color"></div>' +
			'</div>';

		sidebar.appendChild(tool);

		var fgSwatch = tool.querySelector('.ps-fg');
		var bgSwatch = tool.querySelector('.ps-bg');
		var swapBtn = tool.querySelector('.ps-swap');
		var defaultBtn = tool.querySelector('.ps-default');

		fgSwatch.style.backgroundColor = AppConfig.COLOR || '#000000';
		bgSwatch.style.backgroundColor = bgColor;

		/* Click fg → open picker for foreground */
		fgSwatch.addEventListener('click', function(e) {
			e.stopPropagation();
			openPicker(AppConfig.COLOR || '#000000', function(hex) {
				AppConfig.COLOR = hex;
				fgSwatch.style.backgroundColor = hex;
			});
		});

		/* Click bg → open picker for background */
		bgSwatch.addEventListener('click', function(e) {
			e.stopPropagation();
			openPicker(bgColor, function(hex) {
				bgColor = hex;
				bgSwatch.style.backgroundColor = hex;
			});
		});

		/* Swap */
		swapBtn.addEventListener('click', function(e) {
			e.stopPropagation();
			var tmp = AppConfig.COLOR;
			AppConfig.COLOR = bgColor;
			bgColor = tmp;
			fgSwatch.style.backgroundColor = AppConfig.COLOR;
			bgSwatch.style.backgroundColor = bgColor;
		});

		/* Default */
		defaultBtn.addEventListener('click', function(e) {
			e.stopPropagation();
			AppConfig.COLOR = '#000000';
			bgColor = '#ffffff';
			fgSwatch.style.backgroundColor = '#000000';
			bgSwatch.style.backgroundColor = '#ffffff';
		});

		/* Sync fg with external changes (e.g. eyedropper tool) */
		setInterval(function() {
			if (fgSwatch && AppConfig.COLOR) {
				fgSwatch.style.backgroundColor = AppConfig.COLOR;
			}
		}, 200);

		/* Keyboard shortcuts */
		document.addEventListener('keydown', function(e) {
			if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
			if (pickerEl && pickerEl.style.display === 'flex') return;
			if (e.key === 'x' || e.key === 'X') swapBtn.click();
			else if (e.key === 'd' || e.key === 'D') defaultBtn.click();
		});
	}

	/* ── LAYER THUMBNAILS ── */
	function initLayerThumbnails() {
		var layersBase = document.getElementById('layers_base');
		if (!layersBase) return;

		function renderThumbnails() {
			var items = document.querySelectorAll('.layers_list .item');
			if (!items.length) return;
			items.forEach(function(item) {
				var nameBtn = item.querySelector('.layer_name');
				if (!nameBtn) return;
				var layerId = parseInt(nameBtn.getAttribute('data-id'), 10);
				if (isNaN(layerId)) return;
				var layer = null;
				if (AppConfig.layers) {
					for (var i = 0; i < AppConfig.layers.length; i++) {
						if (AppConfig.layers[i].id === layerId) { layer = AppConfig.layers[i]; break; }
					}
				}
				if (!layer) return;
				var thumb = item.querySelector('.layer-thumb');
				if (!thumb) {
					thumb = document.createElement('canvas');
					thumb.className = 'layer-thumb';
					thumb.width = 42;
					thumb.height = 32;
					item.insertBefore(thumb, nameBtn);
				}
				var ctx = thumb.getContext('2d');
				ctx.clearRect(0, 0, 42, 32);
				var src = layer.link_canvas || layer.link;
				if (src && src.width > 0 && src.height > 0) {
					var scale = Math.min(42 / src.width, 32 / src.height);
					var w = src.width * scale, h = src.height * scale;
					var x = (42 - w) / 2, y = (32 - h) / 2;
					try { ctx.drawImage(src, x, y, w, h); } catch(e) {}
				}
			});
		}

		var observer = new MutationObserver(function() { setTimeout(renderThumbnails, 50); });
		observer.observe(layersBase, { childList: true, subtree: true });
		setInterval(renderThumbnails, 1000);
		setTimeout(renderThumbnails, 100);
	}

	/* ── LAYER DRAG-AND-DROP REORDER ── */
	function initLayerDragDrop() {
		var layersBase = document.getElementById('layers_base');
		if (!layersBase) return;

		var dragItem = null;
		var startY = 0;
		var isDragging = false;

		layersBase.addEventListener('mousedown', function(e) {
			var item = e.target.closest('.layers_list .item');
			if (!item) return;
			/* Let button clicks (eye, delete, name) pass through */
			if (e.target.closest('button')) return;

			dragItem = item;
			startY = e.clientY;
			isDragging = false;
		});

		document.addEventListener('mousemove', function(e) {
			if (!dragItem) return;

			if (!isDragging && Math.abs(e.clientY - startY) > 4) {
				isDragging = true;
				dragItem.classList.add('layer-dragging');
			}
			if (!isDragging) return;

			e.preventDefault();

			/* Clear all drop indicators */
			var allItems = layersBase.querySelectorAll('.layers_list .item');
			for (var i = 0; i < allItems.length; i++) {
				allItems[i].classList.remove('layer-drop-above', 'layer-drop-below');
			}

			/* Find target item & show indicator */
			for (var j = 0; j < allItems.length; j++) {
				if (allItems[j] === dragItem) continue;
				var rect = allItems[j].getBoundingClientRect();
				var midY = rect.top + rect.height / 2;
				if (e.clientY >= rect.top && e.clientY < midY) {
					allItems[j].classList.add('layer-drop-above');
					break;
				} else if (e.clientY >= midY && e.clientY <= rect.bottom) {
					allItems[j].classList.add('layer-drop-below');
					break;
				}
			}
		});

		document.addEventListener('mouseup', function() {
			if (!dragItem) return;

			if (isDragging) {
				/* Move DOM element to new position */
				var target = layersBase.querySelector('.layer-drop-above, .layer-drop-below');
				if (target) {
					var isAbove = target.classList.contains('layer-drop-above');
					if (isAbove) {
						target.parentNode.insertBefore(dragItem, target);
					} else {
						target.parentNode.insertBefore(dragItem, target.nextSibling);
					}
				}

				/* Clean up classes */
				dragItem.classList.remove('layer-dragging');
				var allItems = layersBase.querySelectorAll('.layers_list .item');
				for (var i = 0; i < allItems.length; i++) {
					allItems[i].classList.remove('layer-drop-above', 'layer-drop-below');
				}

				/* Update layer order values: top DOM item = highest order = renders on top */
				updateLayerOrders();
			}

			dragItem = null;
			isDragging = false;
		});

		function updateLayerOrders() {
			var items = Array.from(layersBase.querySelectorAll('.layers_list .item'));
			if (!items.length || !AppConfig.layers) return;

			/* Collect existing order values */
			var orderValues = [];
			items.forEach(function(item) {
				var nameBtn = item.querySelector('.layer_name');
				if (!nameBtn) return;
				var id = parseInt(nameBtn.getAttribute('data-id'), 10);
				for (var i = 0; i < AppConfig.layers.length; i++) {
					if (AppConfig.layers[i].id === id) {
						orderValues.push(AppConfig.layers[i].order);
						break;
					}
				}
			});

			/* Sort descending — first DOM item gets highest order */
			orderValues.sort(function(a, b) { return b - a; });

			/* Reassign */
			items.forEach(function(item, idx) {
				var nameBtn = item.querySelector('.layer_name');
				if (!nameBtn) return;
				var id = parseInt(nameBtn.getAttribute('data-id'), 10);
				for (var i = 0; i < AppConfig.layers.length; i++) {
					if (AppConfig.layers[i].id === id) {
						AppConfig.layers[i].order = orderValues[idx];
						break;
					}
				}
			});

			AppConfig.need_render = true;
		}
	}

	/* ── INTERCEPT ALL COLOR PICKERS APP-WIDE ── */
	function interceptColorPickers() {
		/* Capture-phase click handler to catch color inputs before miniPaint */
		document.addEventListener('click', function(e) {
			var target = e.target;
			/* Match: color inputs, color sample divs, color swatch clicks */
			var colorInput = target.closest('input[type="color"]');
			var colorSample = target.closest('.ui_color_sample');
			var colorInputWrap = target.closest('.ui_color_input');

			if (!colorInput && !colorSample && !colorInputWrap) return;

			e.preventDefault();
			e.stopPropagation();
			e.stopImmediatePropagation();

			/* Find the actual <input type="color"> to read/write */
			var input = colorInput;
			if (!input && colorInputWrap) {
				input = colorInputWrap.querySelector('input[type="color"]');
			}
			if (!input && colorSample) {
				var parent = colorSample.closest('.ui_color_input') ||
				             colorSample.parentElement;
				if (parent) input = parent.querySelector('input[type="color"]');
			}

			var currentHex = '#000000';
			if (input && input.value) {
				currentHex = input.value;
			} else if (colorSample) {
				currentHex = colorSample.style.backgroundColor || '#000000';
				/* Convert rgb() to hex if needed */
				var m = currentHex.match(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/);
				if (m) currentHex = rgbToHex(parseInt(m[1]), parseInt(m[2]), parseInt(m[3]));
			}

			openPicker(currentHex, function(hex) {
				if (input) {
					/* Use native setter to bypass any framework */
					var nativeSet = Object.getOwnPropertyDescriptor(
						HTMLInputElement.prototype, 'value'
					).set;
					nativeSet.call(input, hex);
					input.dispatchEvent(new Event('input', { bubbles: true }));
					input.dispatchEvent(new Event('change', { bubbles: true }));
				}
				/* Also update the sample swatch visually */
				if (colorSample) colorSample.style.backgroundColor = hex;
			});
		}, true); /* capture phase */
	}

	/* ── CLEAN ACTIVE TOOL BACKGROUNDS ── */
	function cleanActiveToolBgs() {

				if (el.style.backgroundColor && el.style.backgroundColor !== 'transparent') {

				}
			}
		}, 300);
	}

	/* ── FONTSOURCE FONT INTEGRATION ── */
	function initFontOverride() {
		var SYSTEM_FONTS = [
			{ id: '_arial', family: 'Arial' },
			{ id: '_calibri', family: 'Calibri' },
			{ id: '_cambria', family: 'Cambria' },
			{ id: '_comic-sans', family: 'Comic Sans MS' },
			{ id: '_consolas', family: 'Consolas' },
			{ id: '_courier', family: 'Courier New' },
			{ id: '_garamond', family: 'Garamond' },
			{ id: '_georgia', family: 'Georgia' },
			{ id: '_helvetica', family: 'Helvetica' },
			{ id: '_impact', family: 'Impact' },
			{ id: '_palatino', family: 'Palatino Linotype' },
			{ id: '_segoe', family: 'Segoe UI' },
			{ id: '_tahoma', family: 'Tahoma' },
			{ id: '_times', family: 'Times New Roman' },
			{ id: '_trebuchet', family: 'Trebuchet MS' },
			{ id: '_verdana', family: 'Verdana' }
		];

		var fontsCache = null;
		var fetchProm = null;
		var loadedFonts = {};

		function fetchFonts() {
			if (fontsCache) return Promise.resolve(fontsCache);
			if (fetchProm) return fetchProm;
			fetchProm = fetch('https://api.fontsource.org/v1/fonts?subsets=latin')
				.then(function(r) { return r.json(); })
				.then(function(data) {
					fontsCache = [];
					for (var i = 0; i < data.length; i++) {
						fontsCache.push({ id: data[i].id, family: data[i].family });
					}
					return fontsCache;
				})
				.catch(function() { return []; });
			return fetchProm;
		}

		function loadFont(fontId, family) {
			if (loadedFonts[fontId] || fontId.charAt(0) === '_') return Promise.resolve();
			loadedFonts[fontId] = true;
			var promises = [];
			var weights = [400, 700];
			var styles = ['normal', 'italic'];
			for (var w = 0; w < weights.length; w++) {
				for (var s = 0; s < styles.length; s++) {
					try {
						var url = 'https://cdn.jsdelivr.net/fontsource/fonts/' + fontId +
							'@latest/latin-' + weights[w] + '-' + styles[s] + '.woff2';
						var face = new FontFace(family, 'url(' + url + ')', {
							weight: String(weights[w]),
							style: styles[s]
						});
						promises.push(
							face.load()
								.then(function(f) { document.fonts.add(f); })
								.catch(function() {})
						);
					} catch (e) {}
				}
			}
			return Promise.all(promises).then(function() {
				if (typeof AppConfig !== 'undefined') AppConfig.need_render = true;
			});
		}

		var knownDefaults = ['arial', 'courier', 'times', 'verdana', 'georgia', 'tahoma', 'impact'];

		function isFontSelect(sel) {
			if (sel.dataset.fontOverride) return false;
			for (var i = 0; i < Math.min(sel.options.length, 10); i++) {
				var v = sel.options[i].value.toLowerCase();
				for (var k = 0; k < knownDefaults.length; k++) {
					if (v.indexOf(knownDefaults[k]) >= 0) return true;
				}
			}
			return false;
		}

		/* Build filtered font list items */
		function buildItems(list, allFonts, filter, selectedFamily) {
			list.innerHTML = '';
			var lc = (filter || '').toLowerCase();
			var count = 0;

			/* System fonts first */
			for (var i = 0; i < SYSTEM_FONTS.length; i++) {
				if (lc && SYSTEM_FONTS[i].family.toLowerCase().indexOf(lc) < 0) continue;
				var div = document.createElement('div');
				div.className = 'ps-font-item';
				if (SYSTEM_FONTS[i].family === selectedFamily) div.className += ' selected';
				div.textContent = SYSTEM_FONTS[i].family;
				div.dataset.fid = SYSTEM_FONTS[i].id;
				div.dataset.family = SYSTEM_FONTS[i].family;
				list.appendChild(div);
				count++;
			}

			/* Web fonts */
			for (var j = 0; j < allFonts.length; j++) {
				if (count >= 200) break;
				if (lc && allFonts[j].family.toLowerCase().indexOf(lc) < 0) continue;
				var div2 = document.createElement('div');
				div2.className = 'ps-font-item';
				if (allFonts[j].family === selectedFamily) div2.className += ' selected';
				div2.innerHTML = allFonts[j].family + '<span class="ps-font-tag">web</span>';
				div2.dataset.fid = allFonts[j].id;
				div2.dataset.family = allFonts[j].family;
				list.appendChild(div2);
				count++;
			}
		}

		function replaceFontSelect(sel) {
			if (sel.dataset.fontOverride) return;
			sel.dataset.fontOverride = '1';

			/* Hide original select */
			sel.style.display = 'none';

			/* Remove any old ps-font-search siblings */
			var prev = sel.previousElementSibling;
			if (prev && prev.classList.contains('ps-font-search')) prev.remove();

			/* Build custom picker */
			var picker = document.createElement('div');
			picker.className = 'ps-font-picker';

			var toggle = document.createElement('button');
			toggle.type = 'button';
			toggle.className = 'ps-font-picker-toggle';
			toggle.textContent = sel.value || 'Arial';

			var dropdown = document.createElement('div');
			dropdown.className = 'ps-font-dropdown';

			var searchInput = document.createElement('input');
			searchInput.type = 'text';
			searchInput.className = 'ps-font-dropdown-search';
			searchInput.placeholder = 'Search fonts\u2026';

			var list = document.createElement('div');
			list.className = 'ps-font-dropdown-list';

			dropdown.appendChild(searchInput);
			dropdown.appendChild(list);
			picker.appendChild(toggle);
			document.body.appendChild(dropdown);
			sel.parentNode.insertBefore(picker, sel);

			var currentFamily = sel.value || 'Arial';
			var highlightIdx = -1;
			var lastSetTime = 0; /* timestamp of last explicit selection */

			function syncToNativeSelect(family, fontId) {
				/* Update native select so miniPaint reads the value */
				var found = false;
				for (var i = 0; i < sel.options.length; i++) {
					if (sel.options[i].value === family) {
						sel.value = family;
						found = true;
						break;
					}
				}
				if (!found) {
					var opt = document.createElement('option');
					opt.value = family;
					opt.textContent = family;
					sel.appendChild(opt);
					sel.value = family;
				}
				sel.dispatchEvent(new Event('input', { bubbles: true }));
				sel.dispatchEvent(new Event('change', { bubbles: true }));

				/* miniPaint may rebuild <select> options and lose our value;
				   re-inject after a tick so the value sticks */
				var keepFamily = family;
				setTimeout(function() {
					if (sel.value !== keepFamily) {
						var exists = false;
						for (var i = 0; i < sel.options.length; i++) {
							if (sel.options[i].value === keepFamily) { exists = true; break; }
						}
						if (!exists) {
							var o = document.createElement('option');
							o.value = keepFamily;
							o.textContent = keepFamily;
							sel.appendChild(o);
						}
						sel.value = keepFamily;
					}
				}, 100);
			}

			function selectFont(family, fontId) {
				currentFamily = family;
				lastSetTime = Date.now();
				toggle.textContent = family;
				closePicker();

				/* Load web font if needed */
				if (fontId && fontId.charAt(0) !== '_') {
					loadFont(fontId, family);
				}
				syncToNativeSelect(family, fontId);
			}

			function openPkr() {
				picker.classList.add('open');
				dropdown.style.display = 'flex';
				searchInput.value = '';
				highlightIdx = -1;

				/* Position dropdown below toggle using fixed coords */
				var rect = toggle.getBoundingClientRect();
				dropdown.style.left = rect.left + 'px';
				dropdown.style.top = (rect.bottom + 2) + 'px';
				/* If it would overflow below viewport, open upward */
				var spaceBelow = window.innerHeight - rect.bottom - 4;
				if (spaceBelow < 200) {
					dropdown.style.top = '';
					dropdown.style.bottom = (window.innerHeight - rect.top + 2) + 'px';
					dropdown.style.maxHeight = Math.min(320, rect.top - 4) + 'px';
				} else {
					dropdown.style.bottom = '';
					dropdown.style.maxHeight = Math.min(320, spaceBelow) + 'px';
				}

				fetchFonts().then(function(fonts) {
					buildItems(list, fonts, '', currentFamily);
					/* Scroll selected into view */
					var sel2 = list.querySelector('.selected');
					if (sel2) sel2.scrollIntoView({ block: 'center' });
				});
				setTimeout(function() { searchInput.focus(); }, 10);
			}

			function closePicker() {
				picker.classList.remove('open');
				dropdown.style.display = 'none';
				highlightIdx = -1;
			}

			toggle.addEventListener('click', function(e) {
				e.stopPropagation();
				if (picker.classList.contains('open')) closePicker();
				else openPkr();
			});

			searchInput.addEventListener('input', function() {
				highlightIdx = -1;
				fetchFonts().then(function(fonts) {
					buildItems(list, fonts, searchInput.value, currentFamily);
				});
			});

			/* Click on font item */
			list.addEventListener('click', function(e) {
				var item = e.target.closest('.ps-font-item');
				if (item) selectFont(item.dataset.family, item.dataset.fid);
			});

			/* Keyboard navigation */
			searchInput.addEventListener('keydown', function(e) {
				var items = list.querySelectorAll('.ps-font-item');
				if (e.key === 'ArrowDown') {
					e.preventDefault();
					highlightIdx = Math.min(highlightIdx + 1, items.length - 1);
					updateHighlight(items);
				} else if (e.key === 'ArrowUp') {
					e.preventDefault();
					highlightIdx = Math.max(highlightIdx - 1, 0);
					updateHighlight(items);
				} else if (e.key === 'Enter') {
					e.preventDefault();
					if (highlightIdx >= 0 && items[highlightIdx]) {
						selectFont(items[highlightIdx].dataset.family, items[highlightIdx].dataset.fid);
					}
				} else if (e.key === 'Escape') {
					e.preventDefault();
					closePicker();
				}
			});

			function updateHighlight(items) {
				for (var i = 0; i < items.length; i++) {
					items[i].classList.toggle('highlighted', i === highlightIdx);
				}
				if (highlightIdx >= 0 && items[highlightIdx]) {
					items[highlightIdx].scrollIntoView({ block: 'nearest' });
				}
			}

			/* Close on outside click */
			document.addEventListener('click', function(e) {
				if (!picker.contains(e.target) && !dropdown.contains(e.target)) closePicker();
			});

			/* Keep toggle label in sync if native select changes externally,
			   but ignore for 3s after an explicit selection (miniPaint rebuilds options) */
			setInterval(function() {
				if (Date.now() - lastSetTime < 3000) return;
				if (sel.value && sel.value !== currentFamily) {
					currentFamily = sel.value;
					toggle.textContent = currentFamily;
				}
			}, 500);
		}

		function scanForFontSelects() {
			var selects = document.querySelectorAll('select');
			for (var i = 0; i < selects.length; i++) {
				if (isFontSelect(selects[i])) replaceFontSelect(selects[i]);
			}
		}

		/* Observe panels where font selects appear */
		var watchIds = ['action_attributes', 'popups'];
		for (var t = 0; t < watchIds.length; t++) {
			var el = document.getElementById(watchIds[t]);
			if (el) {
				new MutationObserver(function() {
					setTimeout(scanForFontSelects, 50);
				}).observe(el, { childList: true, subtree: true });
			}
		}

		/* Broad body observer for any dynamic font selects */
		new MutationObserver(function() {
			setTimeout(scanForFontSelects, 200);
		}).observe(document.body, { childList: true, subtree: true });

		setInterval(scanForFontSelects, 3000);
		scanForFontSelects();

		/* Pre-fetch the font list so it's ready when user picks text tool */
		fetchFonts();
	}

	/* ── INPAINT TOOL ── */
	function initInpaintTool() {
		var toolbar = document.getElementById('tools_container');
		if (!toolbar) return;

		/* ── State ── */
		var inpaintActive = false;
		var maskLayerId = null;
		var savedColor = '';
		var savedAlpha = 1;
		var savedTool = null;
		var inpaintModel = 'lama'; /* default model */
		var bar = null;
		var overlay = null;

		/* ── Create toolbar button ── */
		var btn = document.createElement('button');
		btn.className = 'inpaint-tool-btn';
		btn.title = 'Inpaint (object removal)';
		toolbar.appendChild(btn);

		/* ── Create floating action bar (hidden initially) ── */
		bar = document.createElement('div');
		bar.className = 'inpaint-bar';
		bar.style.display = 'none';
		bar.innerHTML =
			'<label>Size <input type="range" class="inpaint-brush-size" min="1" max="200" value="30"></label>' +
			'<button class="inpaint-model-btn" type="button" style="background:#444!important;color:#ccc!important;font-size:10px!important;">LaMa</button>' +
			'<button class="inpaint-apply" type="button">&#x2714; Apply</button>' +
			'<button class="inpaint-cancel" type="button">&#x2716; Cancel</button>';
		document.body.appendChild(bar);

		var sizeSlider = bar.querySelector('.inpaint-brush-size');
		var modelBtn = bar.querySelector('.inpaint-model-btn');
		var applyBtn = bar.querySelector('.inpaint-apply');
		var cancelBtn = bar.querySelector('.inpaint-cancel');

		/* ── Model toggle ── */
		modelBtn.addEventListener('click', function() {
			inpaintModel = inpaintModel === 'lama' ? 'migan' : 'lama';
			modelBtn.textContent = inpaintModel === 'lama' ? 'LaMa' : 'MI-GAN';
		});

		/* ── Create loading overlay (hidden initially) ── */
		overlay = document.createElement('div');
		overlay.className = 'inpaint-overlay';
		overlay.style.display = 'none';
		overlay.innerHTML = '<div class="spinner"></div><div>Removing objects\u2026</div>';
		document.body.appendChild(overlay);

		/* ── Brush size sync ── */
		function syncBrushSize() {
			var s = parseInt(sizeSlider.value, 10);
			/* Set via TOOL.attributes (how miniPaint stores tool params) */
			if (AppConfig.TOOL && AppConfig.TOOL.attributes) {
				AppConfig.TOOL.attributes.size = s;
			}
			/* Also try the right-panel size input so UI stays in sync */
			var sizeInput = document.querySelector('#action_attributes input[id*="size"], #action_attributes input[type="number"]');
			if (sizeInput) {
				var nativeSet = Object.getOwnPropertyDescriptor(HTMLInputElement.prototype, 'value').set;
				nativeSet.call(sizeInput, String(s));
				sizeInput.dispatchEvent(new Event('input', { bubbles: true }));
				sizeInput.dispatchEvent(new Event('change', { bubbles: true }));
			}
		}
		sizeSlider.addEventListener('input', syncBrushSize);

		/* ── Find the brush tool button ── */
		function findBrushBtn() {
			var b = toolbar.querySelector('[title="Brush"]');
			if (b) return b;
			var allBtns = toolbar.querySelectorAll('button');
			for (var i = 0; i < allBtns.length; i++) {
				var t = (allBtns[i].title || '').toLowerCase();
				if (t.indexOf('brush') >= 0 || t.indexOf('paint') >= 0) return allBtns[i];
			}
			for (var i = 0; i < allBtns.length; i++) {
				var bg = window.getComputedStyle(allBtns[i]).backgroundImage || '';
				if (bg.indexOf('brush') >= 0) return allBtns[i];
			}
			return null;
		}

		/* ── Activate inpaint mode ── */
		function activate() {
			if (inpaintActive) return;
			inpaintActive = true;

			/* Save current state */
			savedColor = AppConfig.COLOR || '#000000';
			savedAlpha = typeof AppConfig.ALPHA !== 'undefined' ? AppConfig.ALPHA : 1;

			/* Create a transparent canvas to use as initial layer data */
			var dims = Layers.get_dimensions();
			var initCanvas = document.createElement('canvas');
			initCanvas.width = dims.width;
			initCanvas.height = dims.height;

			/* Create mask layer with canvas data so brush can paint on it */
			Layers.insert({
				name: 'Inpaint Mask',
				type: 'image',
				data: initCanvas,
				width: dims.width,
				height: dims.height,
				width_original: dims.width,
				height_original: dims.height
			});

			/* Find the mask layer we just created (search from end since newest) */
			maskLayerId = null;
			var allLayers = AppConfig.layers;
			for (var i = allLayers.length - 1; i >= 0; i--) {
				if (allLayers[i].name === 'Inpaint Mask') {
					maskLayerId = allLayers[i].id;
					break;
				}
			}

			/* Select it and set drawing color */
			if (maskLayerId !== null) Layers.select(maskLayerId);
			AppConfig.COLOR = '#ff0000';
			AppConfig.ALPHA = 200; /* 0-255 scale, ~78% opacity */

			/* Activate brush tool by clicking its button */
			var brushEl = findBrushBtn();
			if (brushEl) brushEl.click();

			/* Sync brush size after tool activates */
			setTimeout(syncBrushSize, 100);

			/* Show action bar, highlight button */
			bar.style.display = 'flex';
			btn.classList.add('active');
		}

		/* ── Deactivate / cleanup ── */
		function deactivate() {
			if (!inpaintActive) return;
			inpaintActive = false;

			/* Delete mask layer */
			deleteMaskLayer();

			/* Restore state */
			AppConfig.COLOR = savedColor;
			AppConfig.ALPHA = savedAlpha;
			AppConfig.need_render = true;

			/* Hide UI */
			bar.style.display = 'none';
			overlay.style.display = 'none';
			btn.classList.remove('active');
			maskLayerId = null;
		}

		function deleteMaskLayer() {
			if (maskLayerId === null) return;
			var layers = AppConfig.layers;
			for (var i = 0; i < layers.length; i++) {
				if (layers[i].id === maskLayerId) {
					/* Select another layer first */
					var otherId = null;
					for (var j = 0; j < layers.length; j++) {
						if (layers[j].id !== maskLayerId) { otherId = layers[j].id; break; }
					}
					if (otherId !== null) Layers.select(otherId);
					AppConfig.layers.splice(i, 1);
					Layers.render_layers();
					AppConfig.need_render = true;
					break;
				}
			}
		}

		/* ── Apply inpainting ── */
		function applyInpaint() {
			if (!inpaintActive || maskLayerId === null) return;
			overlay.style.display = 'flex';

			try {
				var dims = Layers.get_dimensions();
				var allLayers = AppConfig.layers;

				/* Save visibility state of all layers */
				var savedVis = [];
				for (var i = 0; i < allLayers.length; i++) {
					savedVis.push(allLayers[i].visible);
				}

				/* 1. Render ONLY the mask layer using miniPaint's own renderer */
				for (var i = 0; i < allLayers.length; i++) {
					allLayers[i].visible = (allLayers[i].id === maskLayerId);
				}
				var maskCanvas = document.createElement('canvas');
				maskCanvas.width = dims.width;
				maskCanvas.height = dims.height;
				var maskCtx = maskCanvas.getContext('2d');
				Layers.convert_layers_to_canvas(maskCtx, false);

				/* 2. Render all layers EXCEPT the mask */
				for (var i = 0; i < allLayers.length; i++) {
					allLayers[i].visible = savedVis[i] && (allLayers[i].id !== maskLayerId);
				}
				var compCanvas = document.createElement('canvas');
				compCanvas.width = dims.width;
				compCanvas.height = dims.height;
				var compCtx = compCanvas.getContext('2d');
				Layers.convert_layers_to_canvas(compCtx, false);

				/* 3. Restore original visibility */
				for (var i = 0; i < allLayers.length; i++) {
					allLayers[i].visible = savedVis[i];
				}
				AppConfig.need_render = true;

				/* 4. Convert mask to binary: any pixel with content → white, else → black */
				var maskData = maskCtx.getImageData(0, 0, dims.width, dims.height);
				var hasPaint = false;
				for (var p = 0; p < maskData.data.length; p += 4) {
					/* Check any color channel or alpha for painted content */
					var hasContent = maskData.data[p] > 10 || maskData.data[p + 1] > 10 ||
									 maskData.data[p + 2] > 10 || maskData.data[p + 3] > 10;
					if (hasContent) hasPaint = true;
					maskData.data[p] = maskData.data[p + 1] = maskData.data[p + 2] = hasContent ? 255 : 0;
					maskData.data[p + 3] = 255;
				}

				if (!hasPaint) {
					overlay.style.display = 'none';
					alert('Paint over objects to remove first.');
					return;
				}

				/* 5. Export composited image as PNG, send via ArrayBuffer transfer */
				compCanvas.toBlob(function(blob) {
					var reader = new FileReader();
					reader.onload = function() {
						var imgBuf = reader.result;
						var maskBuf = maskData.data.buffer.slice(0);
						parent.postMessage({
							type: 'inpaint-request',
							image: imgBuf,
							mask: maskBuf,
							width: dims.width,
							height: dims.height,
							model: inpaintModel
						}, '*', [imgBuf, maskBuf]);
					};
					reader.readAsArrayBuffer(blob);
				}, 'image/png');

			} catch (err) {
				overlay.style.display = 'none';
				alert('Inpainting error: ' + (err.message || err));
			}
		}

		/* ── Receive result from parent ── */
		window.addEventListener('message', function(e) {
			if (!e.data) return;

			if (e.data.type === 'inpaint-result') {
				var resultBuf = e.data.image; /* ArrayBuffer */
				var blob = new Blob([new Uint8Array(resultBuf)], { type: 'image/png' });
				var img = new Image();
				img.onload = function() {
					/* Delete mask layer first */
					deleteMaskLayer();
					maskLayerId = null;

					/* Insert result as new layer */
					Layers.insert({
						name: 'Inpainted',
						type: 'image',
						data: img,
						width: img.naturalWidth || img.width,
						height: img.naturalHeight || img.height,
						width_original: img.naturalWidth || img.width,
						height_original: img.naturalHeight || img.height
					});
					URL.revokeObjectURL(img.src);

					/* Restore state */
					AppConfig.COLOR = savedColor;
					AppConfig.ALPHA = savedAlpha;
					AppConfig.need_render = true;

					/* Hide UI */
					inpaintActive = false;
					bar.style.display = 'none';
					overlay.style.display = 'none';
					btn.classList.remove('active');
				};
				img.onerror = function() {
					overlay.style.display = 'none';
					alert('Failed to load inpainted result.');
					deactivate();
				};
				img.src = URL.createObjectURL(blob);
			}

			if (e.data.type === 'inpaint-error') {
				overlay.style.display = 'none';
				alert('Inpainting failed: ' + (e.data.error || 'Unknown error'));
			}
		});

		/* ── Event handlers ── */
		btn.addEventListener('click', function(e) {
			e.stopPropagation();
			if (inpaintActive) {
				deactivate();
			} else {
				activate();
			}
		});

		applyBtn.addEventListener('click', function() { applyInpaint(); });
		cancelBtn.addEventListener('click', function() { deactivate(); });

		/* Keyboard shortcuts */
		document.addEventListener('keydown', function(e) {
			if (!inpaintActive) return;
			if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
			if (e.key === 'Enter') { e.preventDefault(); applyInpaint(); }
			else if (e.key === 'Escape') { e.preventDefault(); deactivate(); }
		});
	}

	/* ── INIT ── */
	function initCustomUI() {
		if (typeof AppConfig === 'undefined' || !document.querySelector('.sidebar_left')) {
			setTimeout(initCustomUI, 200);
			return;
		}
		createPickerDialog();
		createColorTool();
		initLayerThumbnails();
		initLayerDragDrop();
		fixDeleteIcons();
		interceptColorPickers();
		cleanActiveToolBgs();
		initFontOverride();
		initInpaintTool();
	}

	if (document.readyState === 'loading') {
		document.addEventListener('DOMContentLoaded', function() { setTimeout(initCustomUI, 500); });
	} else {
		setTimeout(initCustomUI, 500);
	}
})();
</script>
</body>
</html>
