<!DOCTYPE html>
<html dir="ltr" lang="en-US">
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=0" />
	<title>miniPaint - Image Editor</title>
	<link rel="icon" sizes="192x192" href="images/favicon.png">
	<script src="dist/bundle.js"></script>
</head>
<body>
	<div class="wrapper">
		<nav aria-label="Main Menu" class="main_menu" id="main_menu"></nav>
		<div class="submenu">
			<a class="logo" href="#">miniPaint</a>
			<div class="block attributes" id="action_attributes"></div>
			<button class="undo_button" id="undo_button" type="button">
				<span class="sr_only">Undo</span>
			</button>
		</div>
		<div class="sidebar_left" id="tools_container"></div>
		<div class="middle_area" id="middle_area">
			<canvas class="ruler_left" id="ruler_left"></canvas>
			<canvas class="ruler_top" id="ruler_top"></canvas>
			<div class="main_wrapper" id="main_wrapper">
				<div class="canvas_wrapper" id="canvas_wrapper">
					<div id="mouse"></div>
					<div class="transparent-grid" id="canvas_minipaint_background"></div>
					<canvas id="canvas_minipaint">
						<div class="trn error">Your browser does not support canvas or JavaScript is not enabled.</div>
					</canvas>
				</div>
			</div>
		</div>
		<div class="sidebar_right">
			<div class="preview block">
				<h2 class="trn toggle" data-target="toggle_preview">Preview</h2>
				<div id="toggle_preview"></div>
			</div>
			<div class="colors block">
				<h2 class="trn toggle" data-target="toggle_colors">Colors</h2>
				<div class="content" id="toggle_colors"></div>
			</div>
			<div class="block" id="info_base">
				<h2 class="trn toggle toggle-full" data-target="toggle_info">Information</h2>
				<div class="content" id="toggle_info"></div>
			</div>
			<div class="details block" id="details_base">
				<h2 class="trn toggle toggle-full" data-target="toggle_details">Layer details</h2>
				<div class="content details-content" id="toggle_details"></div>
			</div>
			<div class="layers block">
				<h2 class="trn">Layers</h2>
				<div class="content" id="layers_base"></div>
			</div>
		</div>
	</div>
	<div class="mobile_menu">
		<button class="left_mobile_menu" id="left_mobile_menu_button" type="button">
			<span class="sr_only">Toggle Menu</span>
		</button>
		<button class="right_mobile_menu" id="mobile_menu_button" type="button">
			<span class="sr_only">Toggle Menu</span>
		</button>
	</div>
	<div class="hidden" id="tmp"></div>
	<div id="popups"></div>

<style>
/* ═══════════════════════════════════════════════════════════════════════
   PHOTOPEA-CLONE THEME — Complete visual overhaul for miniPaint
   Purple accent: #6C5CE7  |  Base: #202020  |  Surface: #333333
   ═══════════════════════════════════════════════════════════════════════ */

/* ── 1. CSS VARIABLES — Override everything ── */
:root {
	--background: #1e1e1e !important;
	--text-color: #ccc !important;
	--text-color-muted: #888 !important;
	--text-color-active: #fff !important;
	--text-color-red: #e38282 !important;
	--text-color-green: #8bdb8b !important;
	--text-color-blue: #a4a4ff !important;
	--link-color: #6C5CE7 !important;
	--section-background-color: #333 !important;
	--area-background-color: #252525 !important;
	--block-background-color: #282828 !important;
	--header-background-color: #2a2a2a !important;
	--button-background-color: #444 !important;
	--button-background-color-hover: #555 !important;
	--button-background-color-active: #6C5CE7 !important;
	--button-shadow-color: rgba(0,0,0,0.2) !important;
	--button-text-color-active: #fff !important;
	--button-toggle-background-color: #383838 !important;
	--button-toggle-background-color-hover: #444 !important;
	--button-border-radius: 2px !important;
	--input-background-color: #222 !important;
	--input-background-color-hover: #2a2a2a !important;
	--input-text-color: #ccc !important;
	--input-border-color: #555 !important;
	--input-border-color-active: #6C5CE7 !important;
	--input-border-radius: 2px !important;
	--input-group-border-color: #333 !important;
	--menu-background-color: #222 !important;
	--menu-icons-filter: invert(1) !important;
	--menu-icons-filter-active: none !important;
	--menu-text-color: #bbb !important;
	--background-color-active: #6C5CE7 !important;
	--background-color-hover: #3a3a3a !important;
	--border-color: #444 !important;
	--scrollbar-track-color: #1e1e1e !important;
	--scrollbar-thumb-color: #555 !important;
	--mobile-menu-toggle-filter: invert(1) !important;
	/* Dropdowns */
	--menu-dropdown-background-color: #2a2a2a !important;
	--menu-dropdown-border-color: #555 !important;
	--menu-dropdown-text-color: #ccc !important;
	--menu-dropdown-text-muted-color: #888 !important;
	--menu-dropdown-hover-background-color: #6C5CE7 !important;
	--menu-dropdown-hover-text-color: #fff !important;
	--menu-dropdown-divider-color: #444 !important;
}


/* ── 2. BASE RESET ── */
body {
	background: #1e1e1e !important;
	color: #ccc !important;
	font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, Roboto, Arial, sans-serif !important;
	font-size: 12px !important;
	margin: 0 !important;
	min-height: 100vh !important;
}
* {
	scrollbar-width: thin !important;
	scrollbar-color: #555 #1e1e1e !important;
}
::selection {
	background: #6C5CE7 !important;
	color: #fff !important;
}


/* ── 3. MAIN LAYOUT GRID ── */
.wrapper {
	position: fixed !important;
	top: 24px !important;
	left: 0 !important;
	right: 0 !important;
	bottom: 0 !important;
	display: grid !important;
	grid-template-rows: auto 1fr !important;
	grid-template-columns: auto 1fr auto !important;
	grid-template-areas:
		"submenu submenu submenu"
		"sidebar_left main sidebar_right" !important;
	gap: 0 !important;
	margin: 0 !important;
	overflow: hidden !important;
}


/* ══════════════════════════════════════════
   4. TOP MENU BAR  (Photopea-style)
   ══════════════════════════════════════════ */
.main_menu {
	position: fixed !important;
	top: 0 !important;
	left: 0 !important;
	right: 0 !important;
	z-index: 100 !important;
	height: 24px !important;
	background: #222 !important;
}
.main_menu > ul.menu_bar {
	display: flex !important;
	flex-direction: row !important;
	list-style: none !important;
	padding: 0 !important;
	margin: 0 !important;
	height: 24px !important;
	background: #222 !important;
	border-bottom: 1px solid #111 !important;
}
.main_menu > ul.menu_bar > li {
	padding: 0 !important;
	height: 100% !important;
}
.main_menu > ul.menu_bar > li > a {
	display: flex !important;
	align-items: center !important;
	font-size: 12px !important;
	color: #bbb !important;
	text-decoration: none !important;
	padding: 0 10px !important;
	height: 100% !important;
	transition: none !important;
}
.main_menu > ul.menu_bar > li > a:hover {
	background: #3a3a3a !important;
	color: #fff !important;
	box-shadow: none !important;
}
.main_menu > ul.menu_bar > li > a:focus {
	outline: none !important;
	box-shadow: none !important;
	background: #3a3a3a !important;
}
.main_menu > ul.menu_bar > li > a[aria-expanded="true"] {
	background: #2a2a2a !important;
	color: #fff !important;
}


/* ── 4b. MENU DROPDOWNS ── */
.main_menu > ul.menu_dropdown {
	background: #2a2a2a !important;
	border: 1px solid #555 !important;
	border-radius: 0 !important;
	box-shadow: 2px 4px 12px rgba(0,0,0,0.6) !important;
	padding: 2px 0 !important;
	min-width: 180px !important;
}
.main_menu > ul.menu_dropdown > li > a {
	display: flex !important;
	align-items: center !important;
	color: #ccc !important;
	font-size: 12px !important;
	height: 24px !important;
	line-height: 24px !important;
	padding: 0 28px 0 10px !important;
	text-decoration: none !important;
}
.main_menu > ul.menu_dropdown > li > a:hover,
.main_menu > ul.menu_dropdown > li > a:focus {
	background: #6C5CE7 !important;
	color: #fff !important;
	box-shadow: none !important;
}
.main_menu > ul.menu_dropdown > li > a .shortcut {
	margin-left: auto !important;
	color: #888 !important;
	font-size: 11px !important;
}
.main_menu > ul.menu_dropdown > li > a:hover .shortcut {
	color: rgba(255,255,255,0.7) !important;
}
.main_menu > ul.menu_dropdown > li hr {
	border: none !important;
	border-top: 1px solid #444 !important;
	margin: 2px 0 !important;
}
.main_menu > ul.menu_dropdown > li > a[aria-haspopup="true"]::after {
	color: #888 !important;
}


/* ══════════════════════════════════════════
   5. TOOL OPTIONS BAR  (submenu)
   ══════════════════════════════════════════ */
.submenu {
	grid-area: submenu !important;
	display: flex !important;
	flex-direction: row !important;
	align-items: center !important;
	background: #333 !important;
	margin: 0 !important;
	padding: 0 4px !important;
	height: 28px !important;
	min-height: 28px !important;
	max-height: 28px !important;
	border-bottom: 1px solid #222 !important;
	overflow: hidden !important;
}

/* Logo — hide it like Photopea hides branding */
.logo {
	display: none !important;
}
.logo:after {
	display: none !important;
}

/* Tool attributes in options bar */
.submenu .block.attributes {
	background: transparent !important;
	border: none !important;
	margin: 0 !important;
	padding: 0 4px !important;
	display: flex !important;
	align-items: center !important;
	gap: 6px !important;
	flex: 1 !important;
	height: 100% !important;
}
.submenu .block.attributes .row {
	display: inline-flex !important;
	align-items: center !important;
	margin: 0 !important;
	min-height: auto !important;
	gap: 4px !important;
	float: none !important;
	clear: none !important;
}
.submenu .block.attributes label {
	color: #aaa !important;
	font-size: 11px !important;
	white-space: nowrap !important;
	margin: 0 !important;
}
.submenu .block.attributes select {
	background: #444 !important;
	color: #ccc !important;
	border: 1px solid #555 !important;
	border-radius: 2px !important;
	font-size: 11px !important;
	height: 20px !important;
	padding: 0 4px !important;
}
.submenu .block.attributes input[type="number"],
.submenu .block.attributes input[type="text"] {
	background: #444 !important;
	color: #ccc !important;
	border: 1px solid #555 !important;
	border-radius: 2px !important;
	font-size: 11px !important;
	height: 20px !important;
	padding: 0 4px !important;
	width: 50px !important;
}
.submenu .block.attributes input:focus,
.submenu .block.attributes select:focus {
	border-color: #6C5CE7 !important;
	outline: none !important;
}
.submenu .block.attributes input[type="checkbox"] {
	accent-color: #6C5CE7 !important;
	margin: 0 2px 0 0 !important;
}
.submenu .block.attributes .ui_number_input {
	border: 1px solid #555 !important;
	border-radius: 2px !important;
	overflow: hidden !important;
}
.submenu .block.attributes .ui_number_input input {
	border: none !important;
	height: 18px !important;
}

/* Undo button */
.undo_button {
	display: block !important;
	width: 24px !important;
	height: 24px !important;
	margin-left: auto !important;
	margin-right: 2px !important;
	background-size: auto 16px !important;
	opacity: 0.5 !important;
	border: none !important;
	box-shadow: none !important;
	background-color: transparent !important;
}
.undo_button:hover {
	opacity: 1 !important;
	background-color: transparent !important;
	border: none !important;
}


/* ══════════════════════════════════════════
   6. LEFT TOOLBAR
   Tools blend into the background, color
   picker pinned at the bottom
   ══════════════════════════════════════════ */
.sidebar_left {
	grid-area: sidebar_left !important;
	width: 34px !important;
	background: #333 !important;
	padding: 3px 2px !important;
	margin: 0 !important;
	overflow: hidden !important;
	overflow-y: auto !important;
	align-self: stretch !important;
	border-right: 1px solid #222 !important;
	display: flex !important;
	flex-direction: column !important;
	flex-wrap: nowrap !important;
	align-items: center !important;
	gap: 1px !important;
}
/* Tool buttons — flat icons, no chrome, blend into background */
.sidebar_left button {
	width: 28px !important;
	height: 28px !important;
	min-width: 28px !important;
	min-height: 28px !important;
	margin: 0 !important;
	padding: 0 !important;
	border-radius: 0 !important;
	border: none !important;
	box-shadow: none !important;
	background-color: transparent !important;
	background-size: 20px !important;
	background-position: center !important;
	opacity: 0.65 !important;
	transition: none !important;
	filter: brightness(1.1) !important;
}
.sidebar_left button:hover {
	background-color: transparent !important;
	opacity: 1 !important;
	border: none !important;
}
.sidebar_left button.active {
	background-color: transparent !important;
	opacity: 1 !important;
	border-radius: 0 !important;
	filter: brightness(1.4) drop-shadow(0 0 2px rgba(108,92,231,0.5)) !important;
}

/* ── Color picker: move from right sidebar to bottom of left toolbar ── */
.sidebar_right > .colors {
	position: fixed !important;
	bottom: 4px !important;
	left: 2px !important;
	width: 32px !important;
	height: auto !important;
	z-index: 50 !important;
	background: transparent !important;
	border: none !important;
	border-bottom: none !important;
	overflow: visible !important;
}
/* Hide the "Colors" header when pinned to toolbar */
.sidebar_right > .colors > h2 {
	display: none !important;
}
/* Show only the main color sample, hide the rest */
.sidebar_right > .colors > .content {
	padding: 0 !important;
	background: transparent !important;
}
/* The selected color square — make it the fg/bg indicator */
#selected_color_sample {
	width: 22px !important;
	height: 22px !important;
	border: 2px solid #ccc !important;
	border-radius: 0 !important;
	box-shadow: 1px 1px 0 0 #000, inset 0 0 0 1px #000 !important;
	cursor: pointer !important;
	position: relative !important;
	z-index: 2 !important;
}
/* Hide the color channel sliders, swatches, hex input in the toolbar view */
.sidebar_right > .colors #color_section_channels,
.sidebar_right > .colors #color_section_picker,
.sidebar_right > .colors .ui_button_group {
	display: none !important;
}
/* Keep swatches visible as a small strip */
.sidebar_right > .colors #color_section_swatches {
	display: none !important;
}


/* ══════════════════════════════════════════
   7. CENTER CANVAS AREA
   ══════════════════════════════════════════ */
.middle_area {
	grid-area: main !important;
	position: relative !important;
	background: #1e1e1e !important;
	overflow: hidden !important;
}
.main_wrapper {
	position: absolute !important;
	top: 0 !important;
	left: 0 !important;
	right: 0 !important;
	bottom: 0 !important;
	overflow: auto !important;
	background: #1e1e1e !important;
}
.canvas_wrapper {
	position: relative !important;
}
.ruler_left {
	background-color: #333 !important;
}
.ruler_top {
	background-color: #333 !important;
}


/* ══════════════════════════════════════════
   8. RIGHT SIDEBAR  (Photopea-style panels)
   ══════════════════════════════════════════ */
.sidebar_right {
	grid-area: sidebar_right !important;
	width: 240px !important;
	margin: 0 !important;
	padding: 0 !important;
	background: #292929 !important;
	overflow-x: hidden !important;
	overflow-y: auto !important;
	border-left: 1px solid #222 !important;
	display: flex !important;
	flex-direction: column !important;
}

/* Panel blocks */
.sidebar_right > .block {
	background: #333 !important;
	border: none !important;
	border-bottom: 1px solid #222 !important;
	border-radius: 0 !important;
	margin: 0 !important;
	flex-shrink: 0 !important;
}
.sidebar_right > .block:last-child {
	border-bottom: none !important;
	flex: 1 !important;
}

/* Panel headers — Photopea tab style */
.sidebar_right > .block > h2 {
	background: #2a2a2a !important;
	color: #aaa !important;
	font-size: 11px !important;
	font-weight: 400 !important;
	text-transform: none !important;
	letter-spacing: normal !important;
	padding: 4px 8px !important;
	margin: 0 !important;
	border-radius: 0 !important;
	border-bottom: 1px solid #222 !important;
	cursor: pointer !important;
	line-height: 18px !important;
	height: auto !important;
}
.sidebar_right > .block > h2:hover {
	color: #fff !important;
	background: #353535 !important;
}
.sidebar_right > .block > h2.toggled {
	border-bottom-color: transparent !important;
}
/* Toggle arrow indicator */
.sidebar_right > .block > h2.toggle::after {
	float: right !important;
	font-size: 10px !important;
	color: #888 !important;
}

/* Panel content */
.sidebar_right > .block > .content,
.sidebar_right > .block > div:not(h2) {
	padding: 4px 6px !important;
	background: #333 !important;
}

/* Layers panel — Photopea style, always visible at bottom */
.sidebar_right > .layers {
	flex: 1 !important;
	display: flex !important;
	flex-direction: column !important;
}
.sidebar_right > .layers > h2 {
	background: #2a2a2a !important;
	color: #ddd !important;
	font-weight: 400 !important;
	border-bottom: 2px solid #6C5CE7 !important;
}
.sidebar_right > .layers > .content {
	flex: 1 !important;
	overflow-y: auto !important;
	padding: 2px !important;
}

/* Layer toolbar buttons (+ D R ↑ ↓) */
.layer_add {
	display: inline-block !important;
	padding: 2px 6px !important;
	margin: 0 2px 4px 0 !important;
	background: #6C5CE7 !important;
	border: none !important;
	border-radius: 2px !important;
	color: #fff !important;
	font-size: 12px !important;
	cursor: pointer !important;
	line-height: 1.4 !important;
}
.layer_add:hover {
	background: #7d6ff0 !important;
	border: none !important;
}
.layer_duplicate,
.layer_raster {
	display: inline-block !important;
	padding: 2px 6px !important;
	margin: 0 2px 4px 0 !important;
	background: #444 !important;
	border: none !important;
	border-radius: 2px !important;
	color: #ccc !important;
	font-size: 12px !important;
	cursor: pointer !important;
}
.layer_duplicate:hover,
.layer_raster:hover {
	background: #555 !important;
	border: none !important;
}
.layers_arrow {
	display: inline-block !important;
	padding: 2px 6px !important;
	margin: 0 2px 4px 0 !important;
	background: #444 !important;
	border: none !important;
	border-radius: 2px !important;
	color: #ccc !important;
	font-size: 12px !important;
	cursor: pointer !important;
}
.layers_arrow:hover {
	background: #555 !important;
	border: none !important;
}

/* Layer list */
.layers_list {
	margin-top: 4px !important;
}
.layers_list .item {
	margin-bottom: 1px !important;
	display: flex !important;
	align-items: center !important;
}

/* Layer name — Photopea style */
.layer_name {
	display: block !important;
	padding: 3px 6px !important;
	height: auto !important;
	min-height: 22px !important;
	background: #292929 !important;
	border: 1px solid transparent !important;
	border-radius: 0 !important;
	color: #ccc !important;
	font-size: 11px !important;
	line-height: 16px !important;
	cursor: pointer !important;
	white-space: nowrap !important;
	overflow: hidden !important;
	text-overflow: ellipsis !important;
}
.layer_name:hover {
	background: #3a3a3a !important;
	border-color: transparent !important;
}

/* Active layer — highlighted like Photopea selection */
.layers_list .active .layer_name,
.layers_list .item.active .layer_name {
	background: #6C5CE7 !important;
	color: #fff !important;
	border-color: #6C5CE7 !important;
}

/* Layer visibility eye */
.visibility {
	opacity: 0.4 !important;
	width: 18px !important;
	min-width: 18px !important;
	padding: 0 2px !important;
	margin: 0 !important;
	cursor: pointer !important;
	background: transparent !important;
	border: none !important;
	box-shadow: none !important;
}
.visibility:hover {
	opacity: 1 !important;
	background: transparent !important;
	border: none !important;
}
.visibility.visible {
	opacity: 1 !important;
}

/* Layer delete button */
.delete {
	width: 14px !important;
	min-width: 14px !important;
	opacity: 0.4 !important;
	background-size: 10px !important;
	border: none !important;
	box-shadow: none !important;
}
.delete:hover {
	opacity: 1 !important;
	background-color: transparent !important;
	border: none !important;
}

/* Layer filter items */
.filter {
	margin-bottom: 1px !important;
	margin-left: 24px !important;
	opacity: 0.7 !important;
	font-size: 11px !important;
}

/* Preview / zoom area */
.canvas_preview_wrapper {
	background: #292929 !important;
}
.canvas_preview_details {
	background: transparent !important;
	padding: 4px 0 !important;
}
.canvas_preview_details .details {
	display: flex !important;
	gap: 2px !important;
}
.canvas_preview_details .details button {
	font-size: 10px !important;
	padding: 1px 5px !important;
	background: #444 !important;
	border: none !important;
	color: #ccc !important;
	border-radius: 2px !important;
}
.canvas_preview_details .details button:hover {
	background: #555 !important;
	border: none !important;
}
#zoom_range {
	accent-color: #6C5CE7 !important;
	width: 100% !important;
}

/* Color panel */
.colors .content {
	padding: 4px !important;
}
.colors .ui_color_sample {
	border: 1px solid #555 !important;
	box-shadow: 0 0 0 1px #333 inset !important;
	border-radius: 2px !important;
}
.ui_icon_button {
	background: transparent !important;
	border: none !important;
	color: #aaa !important;
	padding: 2px !important;
	cursor: pointer !important;
	box-shadow: none !important;
}
.ui_icon_button:hover {
	color: #fff !important;
	background: transparent !important;
	border: none !important;
}
.ui_icon_button[aria-pressed="true"] {
	color: #6C5CE7 !important;
}
.block_section {
	border-top: 1px solid #444 !important;
	padding-top: 4px !important;
