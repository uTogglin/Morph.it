	/* ── FONTSOURCE FONT INTEGRATION ── */
	function initFontOverride() {
		var SYSTEM_FONTS = [
			{ id: '_arial', family: 'Arial' },
			{ id: '_calibri', family: 'Calibri' },
			{ id: '_cambria', family: 'Cambria' },
			{ id: '_comic-sans', family: 'Comic Sans MS' },
			{ id: '_consolas', family: 'Consolas' },
			{ id: '_courier', family: 'Courier New' },
			{ id: '_garamond', family: 'Garamond' },
			{ id: '_georgia', family: 'Georgia' },
			{ id: '_helvetica', family: 'Helvetica' },
			{ id: '_impact', family: 'Impact' },
			{ id: '_palatino', family: 'Palatino Linotype' },
			{ id: '_segoe', family: 'Segoe UI' },
			{ id: '_tahoma', family: 'Tahoma' },
			{ id: '_times', family: 'Times New Roman' },
			{ id: '_trebuchet', family: 'Trebuchet MS' },
			{ id: '_verdana', family: 'Verdana' }
		];

		var fontsCache = null;
		var fetchProm = null;
		var loadedFonts = {};

		function fetchFonts() {
			if (fontsCache) return Promise.resolve(fontsCache);
			if (fetchProm) return fetchProm;
			fetchProm = fetch('https://api.fontsource.org/v1/fonts?subsets=latin')
				.then(function(r) { return r.json(); })
				.then(function(data) {
					fontsCache = [];
					for (var i = 0; i < data.length; i++) {
						fontsCache.push({ id: data[i].id, family: data[i].family });
					}
					return fontsCache;
				})
				.catch(function() { return []; });
			return fetchProm;
		}

		function loadFont(fontId, family) {
			if (loadedFonts[fontId] || fontId.charAt(0) === '_') return Promise.resolve();
			loadedFonts[fontId] = true;
			var promises = [];
			var weights = [400, 700];
			var styles = ['normal', 'italic'];
			for (var w = 0; w < weights.length; w++) {
				for (var s = 0; s < styles.length; s++) {
					try {
						var url = 'https://cdn.jsdelivr.net/fontsource/fonts/' + fontId +
							'@latest/latin-' + weights[w] + '-' + styles[s] + '.woff2';
						var face = new FontFace(family, 'url(' + url + ')', {
							weight: String(weights[w]),
							style: styles[s]
						});
						promises.push(
							face.load()
								.then(function(f) { document.fonts.add(f); })
								.catch(function() {})
						);
					} catch (e) {}
				}
			}
			return Promise.all(promises).then(function() {
				if (typeof AppConfig !== 'undefined') AppConfig.need_render = true;
			});
		}

		/* Persisted across picker recreations (survives panel rebuilds) */
		var lastChosenFamily = null;
		var lastChosenFontId = null;

		var knownDefaults = ['arial', 'courier', 'times', 'verdana', 'georgia', 'tahoma', 'impact'];

		function isFontSelect(sel) {
			if (sel.dataset.fontOverride) return false;
			for (var i = 0; i < Math.min(sel.options.length, 10); i++) {
				var v = sel.options[i].value.toLowerCase();
				for (var k = 0; k < knownDefaults.length; k++) {
					if (v.indexOf(knownDefaults[k]) >= 0) return true;
				}
			}
			return false;
		}

		/* Build filtered font list items */
		function buildItems(list, allFonts, filter, selectedFamily) {
			list.innerHTML = '';
			var lc = (filter || '').toLowerCase();
			var count = 0;

			/* System fonts first */
			for (var i = 0; i < SYSTEM_FONTS.length; i++) {
				if (lc && SYSTEM_FONTS[i].family.toLowerCase().indexOf(lc) < 0) continue;
				var div = document.createElement('div');
				div.className = 'ps-font-item';
				if (SYSTEM_FONTS[i].family === selectedFamily) div.className += ' selected';
				div.textContent = SYSTEM_FONTS[i].family;
				div.dataset.fid = SYSTEM_FONTS[i].id;
				div.dataset.family = SYSTEM_FONTS[i].family;
				list.appendChild(div);
				count++;
			}

			/* Web fonts */
			for (var j = 0; j < allFonts.length; j++) {
				if (count >= 200) break;
				if (lc && allFonts[j].family.toLowerCase().indexOf(lc) < 0) continue;
				var div2 = document.createElement('div');
				div2.className = 'ps-font-item';
				if (allFonts[j].family === selectedFamily) div2.className += ' selected';
				div2.innerHTML = allFonts[j].family + '<span class="ps-font-tag">web</span>';
				div2.dataset.fid = allFonts[j].id;
				div2.dataset.family = allFonts[j].family;
				list.appendChild(div2);
				count++;
			}
		}

		function replaceFontSelect(sel) {
			if (sel.dataset.fontOverride) return;
			sel.dataset.fontOverride = '1';

			/* Hide original select */
			sel.style.display = 'none';

			/* Remove any old ps-font-search siblings */
			var prev = sel.previousElementSibling;
			if (prev && prev.classList.contains('ps-font-search')) prev.remove();

			/* Build custom picker */
			var picker = document.createElement('div');
			picker.className = 'ps-font-picker';

			var toggle = document.createElement('button');
			toggle.type = 'button';
			toggle.className = 'ps-font-picker-toggle';
			/* Use persisted choice if available (survives panel rebuilds) */
			var initFamily = lastChosenFamily || sel.value || 'Arial';
			toggle.textContent = initFamily;
			/* Also sync the native select to our persisted choice */
			if (lastChosenFamily) {
				var hasOpt = false;
				for (var z = 0; z < sel.options.length; z++) {
					if (sel.options[z].value === lastChosenFamily) { hasOpt = true; break; }
				}
				if (!hasOpt) {
					var newOpt = document.createElement('option');
					newOpt.value = lastChosenFamily;
					newOpt.textContent = lastChosenFamily;
					sel.appendChild(newOpt);
				}
				sel.value = lastChosenFamily;
			}

			var dropdown = document.createElement('div');
			dropdown.className = 'ps-font-dropdown';

			var searchInput = document.createElement('input');
			searchInput.type = 'text';
			searchInput.className = 'ps-font-dropdown-search';
			searchInput.placeholder = 'Search fonts\u2026';

			var list = document.createElement('div');
			list.className = 'ps-font-dropdown-list';

			dropdown.appendChild(searchInput);
			dropdown.appendChild(list);
			picker.appendChild(toggle);
			document.body.appendChild(dropdown);
			sel.parentNode.insertBefore(picker, sel);

			var currentFamily = lastChosenFamily || sel.value || 'Arial';
			var highlightIdx = -1;

			function ensureOption(family) {
				for (var i = 0; i < sel.options.length; i++) {
					if (sel.options[i].value === family) return;
				}
				var o = document.createElement('option');
				o.value = family;
				o.textContent = family;
				sel.appendChild(o);
			}

			function syncToNativeSelect(family, fontId) {
				ensureOption(family);
				sel.value = family;
				sel.dispatchEvent(new Event('input', { bubbles: true }));
				sel.dispatchEvent(new Event('change', { bubbles: true }));

				/* miniPaint rebuilds options on change; keep re-injecting our value */
				var keepFamily = family;
				var attempts = 0;
				var enforcer = setInterval(function() {
					if (++attempts > 20) { clearInterval(enforcer); return; }
					if (sel.value !== keepFamily) {
						ensureOption(keepFamily);
						sel.value = keepFamily;
					}
				}, 50);
			}

			function selectFont(family, fontId) {
				currentFamily = family;
				lastChosenFamily = family;
				lastChosenFontId = fontId;
				toggle.textContent = family;
				closePicker();

				/* Load web font if needed */
				if (fontId && fontId.charAt(0) !== '_') {
					loadFont(fontId, family);
				}
				syncToNativeSelect(family, fontId);
			}

			function openPkr() {
				picker.classList.add('open');
				dropdown.style.display = 'flex';
				searchInput.value = '';
				highlightIdx = -1;

				/* Position dropdown below toggle using fixed coords */
				var rect = toggle.getBoundingClientRect();
				dropdown.style.left = rect.left + 'px';
				dropdown.style.top = (rect.bottom + 2) + 'px';
				/* If it would overflow below viewport, open upward */
				var spaceBelow = window.innerHeight - rect.bottom - 4;
				if (spaceBelow < 200) {
					dropdown.style.top = '';
					dropdown.style.bottom = (window.innerHeight - rect.top + 2) + 'px';
					dropdown.style.maxHeight = Math.min(320, rect.top - 4) + 'px';
				} else {
					dropdown.style.bottom = '';
					dropdown.style.maxHeight = Math.min(320, spaceBelow) + 'px';
				}

				fetchFonts().then(function(fonts) {
					buildItems(list, fonts, '', currentFamily);
					/* Scroll selected into view */
					var sel2 = list.querySelector('.selected');
					if (sel2) sel2.scrollIntoView({ block: 'center' });
				});
				setTimeout(function() { searchInput.focus(); }, 10);
			}

			function closePicker() {
				picker.classList.remove('open');
				dropdown.style.display = 'none';
				highlightIdx = -1;
			}

			toggle.addEventListener('click', function(e) {
				e.stopPropagation();
				if (picker.classList.contains('open')) closePicker();
				else openPkr();
			});

			searchInput.addEventListener('input', function() {
				highlightIdx = -1;
				fetchFonts().then(function(fonts) {
					buildItems(list, fonts, searchInput.value, currentFamily);
				});
			});

			/* Click on font item */
			list.addEventListener('click', function(e) {
				var item = e.target.closest('.ps-font-item');
				if (item) selectFont(item.dataset.family, item.dataset.fid);
			});

			/* Keyboard navigation */
			searchInput.addEventListener('keydown', function(e) {
				var items = list.querySelectorAll('.ps-font-item');
				if (e.key === 'ArrowDown') {
					e.preventDefault();
					highlightIdx = Math.min(highlightIdx + 1, items.length - 1);
					updateHighlight(items);
				} else if (e.key === 'ArrowUp') {
					e.preventDefault();
					highlightIdx = Math.max(highlightIdx - 1, 0);
					updateHighlight(items);
				} else if (e.key === 'Enter') {
					e.preventDefault();
					if (highlightIdx >= 0 && items[highlightIdx]) {
						selectFont(items[highlightIdx].dataset.family, items[highlightIdx].dataset.fid);
					}
				} else if (e.key === 'Escape') {
					e.preventDefault();
					closePicker();
				}
			});

			function updateHighlight(items) {
				for (var i = 0; i < items.length; i++) {
					items[i].classList.toggle('highlighted', i === highlightIdx);
				}
				if (highlightIdx >= 0 && items[highlightIdx]) {
					items[highlightIdx].scrollIntoView({ block: 'nearest' });
				}
			}

			/* Close on outside click */
			document.addEventListener('click', function(e) {
				if (!picker.contains(e.target) && !dropdown.contains(e.target)) closePicker();
			});

			/* No sync interval — our picker is the source of truth.
			   When miniPaint rebuilds the select (e.g. switching text layers),
			   the mutation observer triggers scanForFontSelects which creates
			   a fresh picker with the correct current value. */
		}

		function scanForFontSelects() {
			var selects = document.querySelectorAll('select');
			for (var i = 0; i < selects.length; i++) {
				if (isFontSelect(selects[i])) replaceFontSelect(selects[i]);
			}
		}

		/* Observe panels where font selects appear */
		var watchIds = ['action_attributes', 'popups'];
		for (var t = 0; t < watchIds.length; t++) {
			var el = document.getElementById(watchIds[t]);
			if (el) {
				new MutationObserver(function() {
					setTimeout(scanForFontSelects, 50);
				}).observe(el, { childList: true, subtree: true });
			}
		}

		/* Broad body observer for any dynamic font selects */
		new MutationObserver(function() {
			setTimeout(scanForFontSelects, 200);
		}).observe(document.body, { childList: true, subtree: true });

		setInterval(scanForFontSelects, 3000);
		scanForFontSelects();

		/* Pre-fetch the font list so it's ready when user picks text tool */
		fetchFonts();
	}

	/* ── INPAINT TOOL ── */
	/* ══════════════════════════════════════════════════════
	   REMOVE BACKGROUND TOOL (inside editor)
	   One-click: composites visible layers → sends to parent
	   for AI background removal → inserts result as new layer.
	   ══════════════════════════════════════════════════════ */
	function initRemoveBgTool() {
		var toolbar = document.getElementById('tools_container');
		if (!toolbar) return;

		var busy = false;

		/* ── Toolbar button ── */
		var btn = document.createElement('button');
		btn.className = 'removebg-tool-btn';
		btn.title = 'Remove background (AI)';
		toolbar.appendChild(btn);

		/* ── Loading overlay (reuses inpaint-overlay styles) ── */
		var overlay = document.createElement('div');
		overlay.className = 'inpaint-overlay';
		overlay.style.display = 'none';
		overlay.innerHTML = '<div class="spinner"></div><div>Removing background\u2026</div>';
		document.body.appendChild(overlay);

		/* ── Run ── */
		function run() {
			if (busy) return;
			busy = true;
			overlay.style.display = 'flex';

			try {
				var dims = Layers.get_dimensions();
				var compCanvas = document.createElement('canvas');
				compCanvas.width = dims.width;
				compCanvas.height = dims.height;
				var compCtx = compCanvas.getContext('2d');
				Layers.convert_layers_to_canvas(compCtx);

				compCanvas.toBlob(function(blob) {
					if (!blob) { finish('Failed to export image.'); return; }
					var reader = new FileReader();
					reader.onload = function() {
						var imgBuf = reader.result;
						parent.postMessage({
							type: 'removebg-request',
							image: imgBuf
						}, '*', [imgBuf]);
					};
					reader.onerror = function() { finish('Failed to read image data.'); };
					reader.readAsArrayBuffer(blob);
				}, 'image/png');
			} catch (err) {
				finish('Error: ' + (err.message || err));
			}
		}

		function finish(errMsg) {
			overlay.style.display = 'none';
			busy = false;
			if (errMsg) alert(errMsg);
		}

		/* ── Receive result from parent ── */
		window.addEventListener('message', function(e) {
			if (!e.data) return;

			if (e.data.type === 'removebg-result') {
				var resultBuf = e.data.image;
				var blob = new Blob([new Uint8Array(resultBuf)], { type: 'image/png' });
				var img = new Image();
				img.onload = function() {
					Layers.insert({
						name: 'No Background',
						type: 'image',
						data: img,
						width: img.naturalWidth || img.width,
						height: img.naturalHeight || img.height,
						width_original: img.naturalWidth || img.width,
						height_original: img.naturalHeight || img.height
					});
					URL.revokeObjectURL(img.src);
					AppConfig.need_render = true;
					finish(null);
				};
				img.onerror = function() { finish('Failed to load result image.'); };
				img.src = URL.createObjectURL(blob);
			}

			if (e.data.type === 'removebg-error') {
				finish('Background removal failed: ' + (e.data.error || 'Unknown error'));
			}
		});

		/* ── Click handler ── */
		btn.addEventListener('click', function(e) {
			e.stopPropagation();
			run();
		});
	}

	function initInpaintTool() {
		var toolbar = document.getElementById('tools_container');
		if (!toolbar) return;

		/* ── State ── */
		var inpaintActive = false;
		var preExistingIds = {}; /* layer IDs that existed before inpaint mode */
		var savedColor = '';
		var savedAlpha = 1;
		var savedTool = null;
		var inpaintModel = 'lama'; /* default model */
		var bar = null;
		var overlay = null;

		/* ── Create toolbar button ── */
		var btn = document.createElement('button');
		btn.className = 'inpaint-tool-btn';
		btn.title = 'Inpaint (object removal)';
		toolbar.appendChild(btn);

		/* ── Create floating action bar (hidden initially) ── */
		bar = document.createElement('div');
		bar.className = 'inpaint-bar';
		bar.style.display = 'none';
		bar.innerHTML =
			'<label>Size <input type="range" class="inpaint-brush-size" min="1" max="200" value="30"></label>' +
			'<button class="inpaint-model-btn" type="button" style="background:#444!important;color:#ccc!important;font-size:10px!important;">LaMa</button>' +
			'<button class="inpaint-apply" type="button">&#x2714; Apply</button>' +
			'<button class="inpaint-cancel" type="button">&#x2716; Cancel</button>';
		document.body.appendChild(bar);

		var sizeSlider = bar.querySelector('.inpaint-brush-size');
		var modelBtn = bar.querySelector('.inpaint-model-btn');
		var applyBtn = bar.querySelector('.inpaint-apply');
		var cancelBtn = bar.querySelector('.inpaint-cancel');

		/* ── Model toggle ── */
		modelBtn.addEventListener('click', function() {
			inpaintModel = inpaintModel === 'lama' ? 'migan' : 'lama';
			modelBtn.textContent = inpaintModel === 'lama' ? 'LaMa' : 'MI-GAN';
		});

		/* ── Create loading overlay (hidden initially) ── */
		overlay = document.createElement('div');
		overlay.className = 'inpaint-overlay';
		overlay.style.display = 'none';
		overlay.innerHTML = '<div class="spinner"></div><div>Removing objects\u2026</div>';
		document.body.appendChild(overlay);

		/* ── Brush size sync ── */
		function syncBrushSize() {
			var s = parseInt(sizeSlider.value, 10);
			/* Set via TOOL.attributes (how miniPaint stores tool params) */
			if (AppConfig.TOOL && AppConfig.TOOL.attributes) {
				AppConfig.TOOL.attributes.size = s;
			}
			/* Also try the right-panel size input so UI stays in sync */
			var sizeInput = document.querySelector('#action_attributes input[id*="size"], #action_attributes input[type="number"]');
			if (sizeInput) {
				var nativeSet = Object.getOwnPropertyDescriptor(HTMLInputElement.prototype, 'value').set;
				nativeSet.call(sizeInput, String(s));
				sizeInput.dispatchEvent(new Event('input', { bubbles: true }));
				sizeInput.dispatchEvent(new Event('change', { bubbles: true }));
			}
		}
		sizeSlider.addEventListener('input', syncBrushSize);

		/* ── Find the brush tool button ── */
		function findBrushBtn() {
			var b = toolbar.querySelector('[title="Brush"]');
			if (b) return b;
			var allBtns = toolbar.querySelectorAll('button');
			for (var i = 0; i < allBtns.length; i++) {
				var t = (allBtns[i].title || '').toLowerCase();
				if (t.indexOf('brush') >= 0 || t.indexOf('paint') >= 0) return allBtns[i];
			}
			for (var i = 0; i < allBtns.length; i++) {
				var bg = window.getComputedStyle(allBtns[i]).backgroundImage || '';
				if (bg.indexOf('brush') >= 0) return allBtns[i];
			}
			return null;
		}

		/* ── Activate inpaint mode ── */
		function activate() {
			if (inpaintActive) return;
			inpaintActive = true;

			/* Save current state */
			savedColor = AppConfig.COLOR || '#000000';
			savedAlpha = typeof AppConfig.ALPHA !== 'undefined' ? AppConfig.ALPHA : 255;

			/* Record existing layer IDs — any layers created after this are mask layers.
			   The brush tool creates its own vector layers (type:"brush"), so we don't
			   pre-create a mask layer. Instead we let the brush naturally create layers
			   and treat all new layers as the inpaint mask. */
			preExistingIds = {};
			for (var i = 0; i < AppConfig.layers.length; i++) {
				preExistingIds[AppConfig.layers[i].id] = true;
			}

			/* Set brush color/alpha for mask painting */
			AppConfig.COLOR = '#ff0000';
			AppConfig.ALPHA = 200; /* 0-255 scale */

			/* Activate brush tool — this will create a new layer when user paints */
			var brushEl = findBrushBtn();
			if (brushEl) brushEl.click();
			setTimeout(syncBrushSize, 150);

			/* Show action bar, highlight button */
			bar.style.display = 'flex';
			btn.classList.add('active');
		}

		/* ── Deactivate / cleanup ── */
		function deactivate() {
			if (!inpaintActive) return;
			inpaintActive = false;

			/* Delete all mask layers (any layers created during inpaint mode) */
			deleteNewLayers();

			/* Restore state */
			AppConfig.COLOR = savedColor;
			AppConfig.ALPHA = savedAlpha;
			AppConfig.need_render = true;

			/* Hide UI */
			bar.style.display = 'none';
			overlay.style.display = 'none';
			btn.classList.remove('active');
		}

		/* Delete all layers created during inpaint mode */
		function deleteNewLayers() {
			var layers = AppConfig.layers;
			/* Set active layer to a pre-existing one (synchronous, avoids async Layers.select) */
			for (var j = 0; j < layers.length; j++) {
				if (preExistingIds[layers[j].id]) {
					AppConfig.layer = layers[j];
					break;
				}
			}
			/* Remove new layers (iterate backwards to avoid index shifts) */
			for (var i = layers.length - 1; i >= 0; i--) {
				if (!preExistingIds[layers[i].id]) {
					layers.splice(i, 1);
				}
			}
			Layers.refresh_gui();
			AppConfig.need_render = true;
		}

		/* ── Apply inpainting ── */
		function applyInpaint() {
			if (!inpaintActive) return;
			overlay.style.display = 'flex';

			try {
				var dims = Layers.get_dimensions();
				var allLayers = AppConfig.layers;

				/* Build set of new layer IDs (layers created during inpaint mode).
				   The brush tool creates vector "brush" layers for strokes,
				   so we treat ALL new layers as the inpaint mask. */
				var newLayerIds = {};
				var hasNewLayers = false;
				for (var i = 0; i < allLayers.length; i++) {
					if (!preExistingIds[allLayers[i].id]) {
						newLayerIds[allLayers[i].id] = true;
						hasNewLayers = true;
					}
				}

				if (!hasNewLayers) {
					overlay.style.display = 'none';
					alert('Paint over objects to remove first.');
					return;
				}

				/* Save visibility state of all layers */
				var savedVis = [];
				for (var i = 0; i < allLayers.length; i++) {
					savedVis.push(allLayers[i].visible);
				}

				/* 1. Render ONLY new layers (mask) using miniPaint's renderer */
				for (var i = 0; i < allLayers.length; i++) {
					allLayers[i].visible = !!newLayerIds[allLayers[i].id];
				}
				var maskCanvas = document.createElement('canvas');
				maskCanvas.width = dims.width;
				maskCanvas.height = dims.height;
				var maskCtx = maskCanvas.getContext('2d');
				Layers.convert_layers_to_canvas(maskCtx);

				/* 2. Render all pre-existing layers (composite image without mask) */
				for (var i = 0; i < allLayers.length; i++) {
					allLayers[i].visible = savedVis[i] && !newLayerIds[allLayers[i].id];
				}
				var compCanvas = document.createElement('canvas');
				compCanvas.width = dims.width;
				compCanvas.height = dims.height;
				var compCtx = compCanvas.getContext('2d');
				Layers.convert_layers_to_canvas(compCtx);

				/* 3. Restore original visibility */
				for (var i = 0; i < allLayers.length; i++) {
					allLayers[i].visible = savedVis[i];
				}
				AppConfig.need_render = true;

				/* 4. Convert mask to binary: any pixel with content → white, else → black */
				var maskData = maskCtx.getImageData(0, 0, dims.width, dims.height);
				var hasPaint = false;
				for (var p = 0; p < maskData.data.length; p += 4) {
					/* Check any color channel or alpha for painted content */
					var hasContent = maskData.data[p] > 10 || maskData.data[p + 1] > 10 ||
									 maskData.data[p + 2] > 10 || maskData.data[p + 3] > 10;
					if (hasContent) hasPaint = true;
					maskData.data[p] = maskData.data[p + 1] = maskData.data[p + 2] = hasContent ? 255 : 0;
					maskData.data[p + 3] = hasContent ? 255 : 0;
				}

				if (!hasPaint) {
					overlay.style.display = 'none';
					alert('Paint over objects to remove first.');
					return;
				}

				/* 5. Export composited image as PNG, send via ArrayBuffer transfer */
				compCanvas.toBlob(function(blob) {
					var reader = new FileReader();
					reader.onload = function() {
						var imgBuf = reader.result;
						var maskBuf = maskData.data.buffer.slice(0);
						parent.postMessage({
							type: 'inpaint-request',
							image: imgBuf,
							mask: maskBuf,
							width: dims.width,
							height: dims.height,
							model: inpaintModel
						}, '*', [imgBuf, maskBuf]);
					};
					reader.readAsArrayBuffer(blob);
				}, 'image/png');

			} catch (err) {
				overlay.style.display = 'none';
				alert('Inpainting error: ' + (err.message || err));
			}
		}

		/* ── Receive result from parent ── */
		window.addEventListener('message', function(e) {
			if (!e.data) return;

			if (e.data.type === 'inpaint-result') {
				var resultBuf = e.data.image; /* ArrayBuffer */
				var blob = new Blob([new Uint8Array(resultBuf)], { type: 'image/png' });
				var img = new Image();
				img.onload = function() {
					/* Delete all mask/brush layers created during inpaint mode */
					deleteNewLayers();

					/* Insert result as new layer */
					Layers.insert({
						name: 'Inpainted',
						type: 'image',
						data: img,
						width: img.naturalWidth || img.width,
						height: img.naturalHeight || img.height,
						width_original: img.naturalWidth || img.width,
						height_original: img.naturalHeight || img.height
					});
					URL.revokeObjectURL(img.src);

					/* Restore state */
					AppConfig.COLOR = savedColor;
					AppConfig.ALPHA = savedAlpha;
					AppConfig.need_render = true;

					/* Hide UI */
					inpaintActive = false;
					bar.style.display = 'none';
					overlay.style.display = 'none';
					btn.classList.remove('active');
				};
				img.onerror = function() {
					overlay.style.display = 'none';
					alert('Failed to load inpainted result.');
					deactivate();
				};
				img.src = URL.createObjectURL(blob);
			}

			if (e.data.type === 'inpaint-error') {
				overlay.style.display = 'none';
				alert('Inpainting failed: ' + (e.data.error || 'Unknown error'));
			}
		});

		/* ── Event handlers ── */
		btn.addEventListener('click', function(e) {
			e.stopPropagation();
			if (inpaintActive) {
				deactivate();
			} else {
				activate();
			}
		});

		applyBtn.addEventListener('click', function() { applyInpaint(); });
		cancelBtn.addEventListener('click', function() { deactivate(); });

		/* Keyboard shortcuts */
		document.addEventListener('keydown', function(e) {
			if (!inpaintActive) return;
			if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
			if (e.key === 'Enter') { e.preventDefault(); applyInpaint(); }
			else if (e.key === 'Escape') { e.preventDefault(); deactivate(); }
		});
	}

	/* ══════════════════════════════════════════════════════
	   MAGIC WAND SELECTION TOOL
	   Photoshop-style selection: flood fill → marching ants
	   → delete / fill / invert / deselect
	   ══════════════════════════════════════════════════════ */
	function initMagicWandTool() {
		var toolbar = document.getElementById('tools_container');
		if (!toolbar) return;

		/* ── State ── */
		var wandActive = false;
		var selectionMask = null;   /* Uint8Array(w*h), 1=selected */
		var cachedSegments = null;  /* pre-computed boundary segments */
		var tolerance = 15;
		var contiguous = true;
		var imgW = 0, imgH = 0;
		var animFrame = null;
		var dashOffset = 0;
		var overlayCanvas = null;
		var overlayCtx = null;

		/* ── Toolbar button ── */
		var btn = document.createElement('button');
		btn.className = 'magicwand-tool-btn';
		btn.title = 'Magic Wand (select by color)';
		toolbar.appendChild(btn);

		/* ── Floating action bar (hidden initially) ── */
		var bar = document.createElement('div');
		bar.className = 'magicwand-bar';
		bar.style.display = 'none';
		bar.innerHTML =
			'<label>Tol <input type="range" class="mw-tolerance" min="0" max="100" value="15"><span class="mw-tol-val">15</span></label>' +
			'<label><input type="checkbox" class="mw-contiguous" checked> Contig</label>' +
			'<button class="mw-delete" type="button">Delete</button>' +
			'<button class="mw-fill" type="button">Fill</button>' +
			'<button class="mw-invert" type="button">Invert</button>' +
			'<button class="mw-deselect" type="button">Deselect</button>';
		document.body.appendChild(bar);

		var tolSlider = bar.querySelector('.mw-tolerance');
		var tolVal = bar.querySelector('.mw-tol-val');
		var contigCheck = bar.querySelector('.mw-contiguous');
		var deleteBtn = bar.querySelector('.mw-delete');
		var fillBtn = bar.querySelector('.mw-fill');
		var invertBtn = bar.querySelector('.mw-invert');
		var deselectBtn = bar.querySelector('.mw-deselect');

		tolSlider.addEventListener('input', function() {
			tolerance = parseInt(tolSlider.value, 10);
			tolVal.textContent = tolerance;
		});
		contigCheck.addEventListener('change', function() {
			contiguous = contigCheck.checked;
		});

		/* ── Overlay canvas (marching ants) ── */
		function ensureOverlay() {
			var wrapper = document.getElementById('canvas_wrapper');
			var mainCanvas = document.getElementById('canvas_minipaint');
			if (!wrapper || !mainCanvas) return;

			if (!overlayCanvas) {
				overlayCanvas = document.createElement('canvas');
				overlayCanvas.className = 'magicwand-overlay';
				wrapper.appendChild(overlayCanvas);
				overlayCtx = overlayCanvas.getContext('2d');
			}
			/* Sync size with main canvas */
			var cw = mainCanvas.width;
			var ch = mainCanvas.height;
			if (overlayCanvas.width !== cw || overlayCanvas.height !== ch) {
				overlayCanvas.width = cw;
				overlayCanvas.height = ch;
				overlayCanvas.style.width = mainCanvas.style.width || (cw + 'px');
				overlayCanvas.style.height = mainCanvas.style.height || (ch + 'px');
			}
		}

		/* ── Coordinate translation (screen → image space) ── */
		function toImageCoords(e) {
			var zoom = (typeof AppConfig !== 'undefined' && AppConfig.ZOOM) ? AppConfig.ZOOM : 1;
			var x = Math.floor(e.offsetX / zoom);
			var y = Math.floor(e.offsetY / zoom);
			return { x: x, y: y };
		}

		/* ── Get composited image data ── */
		function getCompositeData(w, h) {
			var c = document.createElement('canvas');
			c.width = w;
			c.height = h;
			var ctx = c.getContext('2d');
			Layers.convert_layers_to_canvas(ctx);
			return ctx.getImageData(0, 0, w, h);
		}

		/* ── Flood fill (builds selection mask) ── */
		function floodFill(imageData, startX, startY, w, h, tol, isContiguous) {
			var data = imageData.data;
			var mask = new Uint8Array(w * h);
			var tolScaled = tol * 255 / 100;

			/* Sample target color at click point */
			var idx = (startY * w + startX) * 4;
			var tR = data[idx], tG = data[idx + 1], tB = data[idx + 2], tA = data[idx + 3];

			function matches(i) {
				var off = i * 4;
				return Math.abs(data[off] - tR) <= tolScaled &&
					   Math.abs(data[off + 1] - tG) <= tolScaled &&
					   Math.abs(data[off + 2] - tB) <= tolScaled &&
					   Math.abs(data[off + 3] - tA) <= tolScaled;
			}

			if (isContiguous) {
				/* Stack-based BFS, 4-connected */
				var visited = new Uint8Array(w * h);
				var stack = [startX, startY];
				visited[startY * w + startX] = 1;

				while (stack.length > 0) {
					var sy = stack.pop();
					var sx = stack.pop();
					var si = sy * w + sx;

					if (matches(si)) {
						mask[si] = 1;
						/* 4-connected neighbors */
						if (sx > 0 && !visited[si - 1]) { visited[si - 1] = 1; stack.push(sx - 1, sy); }
						if (sx < w - 1 && !visited[si + 1]) { visited[si + 1] = 1; stack.push(sx + 1, sy); }
						if (sy > 0 && !visited[si - w]) { visited[si - w] = 1; stack.push(sx, sy - 1); }
						if (sy < h - 1 && !visited[si + w]) { visited[si + w] = 1; stack.push(sx, sy + 1); }
					}
				}
			} else {
				/* Non-contiguous: global scan */
				for (var i = 0; i < w * h; i++) {
					if (matches(i)) mask[i] = 1;
				}
			}

			return mask;
		}

		/* ── Pre-compute boundary segments ── */
		function computeBoundarySegments(mask, w, h) {
			var segs = [];
			for (var y = 0; y < h; y++) {
				for (var x = 0; x < w; x++) {
					if (!mask[y * w + x]) continue;
					/* top edge */
					if (y === 0 || !mask[(y - 1) * w + x])
						segs.push(x, y, x + 1, y);
					/* bottom edge */
					if (y === h - 1 || !mask[(y + 1) * w + x])
						segs.push(x, y + 1, x + 1, y + 1);
					/* left edge */
					if (x === 0 || !mask[y * w + x - 1])
						segs.push(x, y, x, y + 1);
					/* right edge */
					if (x === w - 1 || !mask[y * w + x + 1])
						segs.push(x + 1, y, x + 1, y + 1);
				}
			}
			return segs;
		}

		/* ── Marching ants animation ── */
		function drawAnts() {
			ensureOverlay();
			if (!overlayCtx || !cachedSegments || cachedSegments.length === 0) return;

			var zoom = (typeof AppConfig !== 'undefined' && AppConfig.ZOOM) ? AppConfig.ZOOM : 1;

			/* Check canvas size sync */
			var mainCanvas = document.getElementById('canvas_minipaint');
			if (mainCanvas) {
				if (overlayCanvas.width !== mainCanvas.width || overlayCanvas.height !== mainCanvas.height) {
					overlayCanvas.width = mainCanvas.width;
					overlayCanvas.height = mainCanvas.height;
					overlayCanvas.style.width = mainCanvas.style.width || (mainCanvas.width + 'px');
					overlayCanvas.style.height = mainCanvas.style.height || (mainCanvas.height + 'px');
				}
			}

			overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

			var segs = cachedSegments;

			/* Pass 1: black dashes */
			overlayCtx.strokeStyle = 'rgba(0,0,0,0.8)';
			overlayCtx.lineWidth = 1;
			overlayCtx.setLineDash([4, 4]);
			overlayCtx.lineDashOffset = dashOffset;
			overlayCtx.beginPath();
			for (var i = 0; i < segs.length; i += 4) {
				overlayCtx.moveTo(segs[i] * zoom, segs[i + 1] * zoom);
				overlayCtx.lineTo(segs[i + 2] * zoom, segs[i + 3] * zoom);
			}
			overlayCtx.stroke();

			/* Pass 2: white dashes (offset) */
			overlayCtx.strokeStyle = 'rgba(255,255,255,0.9)';
			overlayCtx.lineDashOffset = dashOffset + 4;
			overlayCtx.beginPath();
			for (var i = 0; i < segs.length; i += 4) {
				overlayCtx.moveTo(segs[i] * zoom, segs[i + 1] * zoom);
				overlayCtx.lineTo(segs[i + 2] * zoom, segs[i + 3] * zoom);
			}
			overlayCtx.stroke();

			overlayCtx.setLineDash([]);

			dashOffset -= 0.4;
			if (dashOffset < -12) dashOffset = 0;

			animFrame = requestAnimationFrame(drawAnts);
		}

		function startAnts() {
			stopAnts();
			dashOffset = 0;
			animFrame = requestAnimationFrame(drawAnts);
		}

		function stopAnts() {
			if (animFrame) {
				cancelAnimationFrame(animFrame);
				animFrame = null;
			}
			if (overlayCtx && overlayCanvas) {
				overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
			}
		}

		/* ── Clear selection ── */
		function clearSelection() {
			selectionMask = null;
			cachedSegments = null;
			stopAnts();
		}

		/* ── Activate / deactivate wand ── */
		function activate() {
			wandActive = true;
			btn.classList.add('active');
			bar.style.display = 'flex';
			ensureOverlay();
		}

		function deactivate() {
			wandActive = false;
			btn.classList.remove('active');
			bar.style.display = 'none';
			clearSelection();
		}

		/* ── Canvas click handler (capture phase) ── */
		var mainCanvas = document.getElementById('canvas_minipaint');
		if (mainCanvas) {
			mainCanvas.addEventListener('click', function(e) {
				if (!wandActive) return;
				e.stopPropagation();
				e.preventDefault();

				var coords = toImageCoords(e);
				var dims = Layers.get_dimensions();
				var w = dims.width;
				var h = dims.height;

				/* Bounds check */
				if (coords.x < 0 || coords.x >= w || coords.y < 0 || coords.y >= h) return;

				var imageData = getCompositeData(w, h);
				var newMask = floodFill(imageData, coords.x, coords.y, w, h, tolerance, contiguous);

				/* Shift+click: union with existing mask */
				if (e.shiftKey && selectionMask && imgW === w && imgH === h) {
					for (var i = 0; i < newMask.length; i++) {
						if (newMask[i]) selectionMask[i] = 1;
					}
				} else {
					selectionMask = newMask;
					imgW = w;
					imgH = h;
				}

				cachedSegments = computeBoundarySegments(selectionMask, imgW, imgH);
				startAnts();
			}, true); /* capture phase */

			/* Prevent mousedown/mouseup from reaching miniPaint tools when wand is active */
			mainCanvas.addEventListener('mousedown', function(e) {
				if (wandActive) { e.stopPropagation(); }
			}, true);
			mainCanvas.addEventListener('mouseup', function(e) {
				if (wandActive) { e.stopPropagation(); }
			}, true);
		}

		/* ── Selection operations ── */

		/* Delete: set alpha=0 for selected pixels on active layer */
		function doDelete() {
			if (!selectionMask || !AppConfig.layer) return;
			var layer = AppConfig.layer;
			var w = imgW, h = imgH;

			/* Get layer's pixel data */
			var srcCanvas = document.createElement('canvas');
			srcCanvas.width = w;
			srcCanvas.height = h;
			var srcCtx = srcCanvas.getContext('2d');
			var src = layer.link_canvas || layer.link;
			if (src) srcCtx.drawImage(src, 0, 0, w, h);
			var pixData = srcCtx.getImageData(0, 0, w, h);
			var d = pixData.data;

			for (var i = 0; i < selectionMask.length; i++) {
				if (selectionMask[i]) {
					d[i * 4 + 3] = 0; /* set alpha to 0 */
				}
			}

			srcCtx.putImageData(pixData, 0, 0);

			/* Write back via toDataURL → new Image → layer.link */
			var dataUrl = srcCanvas.toDataURL('image/png');
			var img = new Image();
			img.onload = function() {
				layer.link = img;
				AppConfig.need_render = true;
			};
			img.src = dataUrl;
			clearSelection();
		}

		/* Fill: fill selected pixels with current color + alpha */
		function doFill() {
			if (!selectionMask || !AppConfig.layer) return;
			var layer = AppConfig.layer;
			var w = imgW, h = imgH;

			/* Parse current color */
			var hex = AppConfig.COLOR || '#000000';
			var cR = parseInt(hex.substring(1, 3), 16) || 0;
			var cG = parseInt(hex.substring(3, 5), 16) || 0;
			var cB = parseInt(hex.substring(5, 7), 16) || 0;
			var cA = (typeof AppConfig.ALPHA !== 'undefined') ? AppConfig.ALPHA : 255;

			var srcCanvas = document.createElement('canvas');
			srcCanvas.width = w;
			srcCanvas.height = h;
			var srcCtx = srcCanvas.getContext('2d');
			var src = layer.link_canvas || layer.link;
			if (src) srcCtx.drawImage(src, 0, 0, w, h);
			var pixData = srcCtx.getImageData(0, 0, w, h);
			var d = pixData.data;

			for (var i = 0; i < selectionMask.length; i++) {
				if (selectionMask[i]) {
					d[i * 4] = cR;
					d[i * 4 + 1] = cG;
					d[i * 4 + 2] = cB;
					d[i * 4 + 3] = cA;
				}
			}

			srcCtx.putImageData(pixData, 0, 0);
			var dataUrl = srcCanvas.toDataURL('image/png');
			var img = new Image();
			img.onload = function() {
				layer.link = img;
				AppConfig.need_render = true;
			};
			img.src = dataUrl;
			clearSelection();
		}

		/* Invert: flip all mask values */
		function doInvert() {
			if (!selectionMask) return;
			for (var i = 0; i < selectionMask.length; i++) {
				selectionMask[i] = selectionMask[i] ? 0 : 1;
			}
			cachedSegments = computeBoundarySegments(selectionMask, imgW, imgH);
			startAnts();
		}

		/* ── Button handlers ── */
		deleteBtn.addEventListener('click', function() { doDelete(); });
		fillBtn.addEventListener('click', function() { doFill(); });
		invertBtn.addEventListener('click', function() { doInvert(); });
		deselectBtn.addEventListener('click', function() { clearSelection(); });

		/* ── Toolbar toggle ── */
		btn.addEventListener('click', function(e) {
			e.stopPropagation();
			if (wandActive) {
				deactivate();
			} else {
				activate();
			}
		});

		/* ── Keyboard shortcuts ── */
		document.addEventListener('keydown', function(e) {
			if (!wandActive) return;
			if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

			if (e.key === 'Escape') {
				e.preventDefault();
				if (selectionMask) {
					clearSelection();
				} else {
					deactivate();
				}
			} else if (e.key === 'Delete' || e.key === 'Backspace') {
				e.preventDefault();
				doDelete();
			}
		});

		/* ── Watch for canvas dimension changes (crop/resize) ── */
		var lastW = 0, lastH = 0;
		function checkDimensionChange() {
			if (typeof Layers !== 'undefined' && Layers.get_dimensions) {
				var dims = Layers.get_dimensions();
				if (dims.width !== lastW || dims.height !== lastH) {
					if (lastW !== 0 && lastH !== 0 && selectionMask) {
						clearSelection();
					}
					lastW = dims.width;
					lastH = dims.height;
				}
			}
		}
		setInterval(checkDimensionChange, 1000);
	}

	/* ══════════════════════════════════════════════════════
	   FULLSCREEN & SAVE BUTTONS (in submenu bar)
	   Communicate with parent via postMessage since the
	   iframe can't fullscreen the parent container directly.
	   ══════════════════════════════════════════════════════ */
	function initSubmenuButtons() {
		var fsBtn = document.getElementById('submenu_fs_btn');
		var saveBtn = document.getElementById('submenu_save_btn');

		/* Fullscreen toggle */
		if (fsBtn) {
			fsBtn.addEventListener('click', function(e) {
				e.stopPropagation();
				parent.postMessage({ type: 'fullscreen-toggle' }, '*');
			});
		}

		/* Save — open miniPaint's own Export dialog */
		if (saveBtn) {
			saveBtn.addEventListener('click', function(e) {
				e.stopPropagation();
				if (typeof FileSave !== 'undefined' && FileSave.export) {
					FileSave.export();
				}
			});
		}

		/* Listen for fullscreen state changes from parent */
		window.addEventListener('message', function(e) {
			if (!e.data) return;
			if (e.data.type === 'fullscreen-changed' && fsBtn) {
				var expand = fsBtn.querySelector('.fs-expand');
				var collapse = fsBtn.querySelector('.fs-collapse');
				if (expand) expand.style.display = e.data.isFullscreen ? 'none' : '';
				if (collapse) collapse.style.display = e.data.isFullscreen ? '' : 'none';
			}
		});
	}

	/* ── INIT ── */
	function initCustomUI() {
		if (typeof AppConfig === 'undefined' || !document.querySelector('.sidebar_left')) {
			setTimeout(initCustomUI, 200);
			return;
		}
		createPickerDialog();
		createColorTool();
		initLayerThumbnails();
		initLayerDragDrop();
		fixDeleteIcons();
		initColorSystem();
		cleanActiveToolBgs();
		initFontOverride();
		initRemoveBgTool();
		initInpaintTool();
		initMagicWandTool();
		initSubmenuButtons();
	}

	if (document.readyState === 'loading') {
		document.addEventListener('DOMContentLoaded', function() { setTimeout(initCustomUI, 500); });
	} else {
		setTimeout(initCustomUI, 500);
	}
})();
</script>
</body>
</html>
